
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Литературная бродилка 5x5</title>
    <link rel="stylesheet" href="style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Montserrat', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            padding: 20px;
            background: linear-gradient(135deg, #0a0f0a 0%, #1a2a1a 100%);
        }

        .board-container {
            max-width: 750px;
            margin: 0 auto;
            background: rgba(255,248,225,0.95);
            border-radius: 32px;
            padding: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f7d44a;
            flex-wrap: wrap;
            gap: 10px;
        }

        .back-btn {
            background: #8b5a2b;
            color: white;
            text-decoration: none;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: #5a3a1a;
            transform: translateX(-3px);
        }

        .stats-panel {
            display: flex;
            gap: 20px;
        }

        .stat {
            background: #f7d44a20;
            padding: 8px 18px;
            border-radius: 30px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat span:first-child {
            font-size: 20px;
        }

        .stat span:last-child {
            color: #2c5530;
            font-size: 20px;
            font-weight: bold;
        }

        .location {
            text-align: center;
            margin-bottom: 25px;
            padding: 15px;
            background: linear-gradient(135deg, #f7d44a20, transparent);
            border-radius: 20px;
        }

        .location-icon {
            font-size: 56px;
        }

        .location h3 {
            font-size: 28px;
            color: #2c5530;
            margin-top: 10px;
        }

        .location-desc {
            font-size: 14px;
            color: #5a4a2e;
            margin-top: 5px;
        }

        /* Поле 5x5 - большие клетки */
        .grid-5x5 {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            margin: 30px 0;
            justify-items: center;
            align-items: center;
        }

        .cell {
            width: 100%;
            aspect-ratio: 1 / 1;
            max-width: 100px;
            background: #c0b88a;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            transition: all 0.2s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            cursor: default;
            color: #5a4a2e;
            text-align: center;
        }

        .cell .cell-icon {
            font-size: 42px;
        }

        .cell.passed {
            background: #2c5530;
            color: white;
        }

        .cell.current {
            background: #f7d44a;
            transform: scale(1.05);
            box-shadow: 0 0 20px gold;
            color: #2c5530;
        }

        .cell.current .cell-icon {
            font-size: 48px;
        }

        .cell.available {
            background: #90be6d;
            cursor: pointer;
            color: white;
        }

        .cell.available:hover {
            background: #6a994e;
            transform: scale(1.02);
        }

        .cell.locked {
            background: #aaa;
            color: #666;
            cursor: not-allowed;
        }

        /* Легенда */
        .legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
            padding: 15px;
            background: #f0e8d0;
            border-radius: 50px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #2c5530;
        }

        .legend-icon {
            font-size: 22px;
        }

        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #fff8f0;
            border-radius: 32px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            animation: modalFadeIn 0.3s ease;
        }

        @keyframes modalFadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f7d44a;
        }

        .modal-header h3 {
            color: #2c5530;
            font-size: 20px;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #8b5a2b;
        }

        .question-text {
            font-size: 20px;
            line-height: 1.4;
            color: #2c2c2c;
            margin: 20px 0;
            font-weight: 500;
            background: #f9f5e8;
            padding: 20px;
            border-radius: 20px;
        }

        .timer-area {
            background: #fff0e0;
            border-radius: 20px;
            padding: 15px;
            margin: 15px 0;
            text-align: center;
        }

        .timer-display {
            font-size: 48px;
            font-weight: bold;
            font-family: monospace;
            color: #bc4742;
            margin: 10px 0;
        }

        .timer-display.warning {
            animation: timerBlink 0.5s step-end infinite;
        }

        @keyframes timerBlink {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.05); }
        }

        .options-grid {
            display: grid;
            gap: 12px;
            margin: 20px 0;
        }

        .modal-option {
            background: linear-gradient(135deg, #f5f0e3 0%, #efe6d4 100%);
            padding: 14px 18px;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.2s;
            border: 2px solid transparent;
            font-size: 16px;
        }

        .modal-option:hover {
            background: #f7d44a;
            transform: translateX(5px);
        }

        .modal-option.correct {
            background: linear-gradient(135deg, #90be6d, #6a994e);
            color: white;
        }

        .modal-option.wrong {
            background: linear-gradient(135deg, #e76f51, #bc4742);
            color: white;
        }

        .modal-feedback {
            margin-top: 20px;
            padding: 12px;
            border-radius: 16px;
            font-size: 14px;
            text-align: center;
        }

        .modal-feedback.correct {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid #28a745;
        }

        .modal-feedback.wrong {
            background: #f8d7da;
            color: #721c24;
            border-left: 4px solid #dc3545;
        }

        /* Кнопки в модальном окне */
        .modal-btn {
            background: #8b5a2b;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
        }

        .modal-btn:hover {
            background: #5a3a1a;
            transform: scale(1.05);
        }

        .final-icon {
            font-size: 70px;
            text-align: center;
            margin-bottom: 15px;
        }

        .final-score {
            font-size: 30px;
            font-weight: bold;
            color: #f7d44a;
            background: #2c5530;
            display: inline-block;
            padding: 8px 25px;
            border-radius: 50px;
            margin: 15px 0;
            text-align: center;
        }

        @media (max-width: 600px) {
            .grid-5x5 { gap: 8px; }
            .cell .cell-icon { font-size: 28px; }
            .cell.current .cell-icon { font-size: 32px; }
            .legend { gap: 12px; }
            .legend-item { font-size: 11px; }
            .modal-content { padding: 20px; }
            .question-text { font-size: 16px; }
        }
    </style>
</head>
<body id="boardBody">
    <div class="board-container">
        <div class="game-header">
            <a href="index.html" class="back-btn">← Главное меню</a>
            <div class="stats-panel">
                <div class="stat"><span>❤️</span><span id="lives">3</span></div>
                <div class="stat"><span>⭐</span><span id="score">0</span></div>
                <div class="stat"><span>🚶</span><span id="moves">0</span></div>
            </div>
        </div>
        
        <div class="location" id="location">
            <div class="location-icon" id="boardIcon">📖</div>
            <h3 id="boardTitle">Загрузка...</h3>
            <p class="location-desc" id="boardDesc"></p>
        </div>
        
        <div class="grid-5x5" id="gridContainer"></div>
        
        <div class="legend">
            <div class="legend-item"><span class="legend-icon">🎮</span> <span>Ты здесь</span></div>
            <div class="legend-item"><span class="legend-icon">❓</span> <span>Вопрос (+10/20)</span></div>
            <div class="legend-item"><span class="legend-icon">🔗</span> <span>Бонус (+5)</span></div>
            <div class="legend-item"><span class="legend-icon">📌</span> <span>Ловушка (-1 жизнь)</span></div>
            <div class="legend-item"><span class="legend-icon">⬜</span> <span>Пусто</span></div>
            <div class="legend-item"><span class="legend-icon">🏅</span> <span>Финиш</span></div>
        </div>
    </div>

    <!-- Модальное окно для вопросов -->
    <div id="questionModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">📖 Вопрос</h3>
                <button class="modal-close" id="modalCloseBtn">×</button>
            </div>
            <div id="modalBody"></div>
        </div>
    </div>

    <!-- Модальное окно для поражения -->
    <div id="defeatModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>💀 Поражение</h3>
                <button class="modal-close" id="defeatCloseBtn">×</button>
            </div>
            <div id="defeatBody" style="text-align: center;">
                <div class="final-icon">💀</div>
                <p style="font-size: 18px; margin: 15px 0;">У вас закончились жизни!</p>
                <div class="final-score" id="defeatScore">0 баллов</div>
                <button id="defeatResetBtn" class="modal-btn">Начать заново</button>
            </div>
        </div>
    </div>

    <!-- Модальное окно для победы -->
    <div id="victoryModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>🏆 Победа!</h3>
                <button class="modal-close" id="victoryCloseBtn">×</button>
            </div>
            <div id="victoryBody" style="text-align: center;">
                <div class="final-icon">🏆</div>
                <p style="font-size: 18px; margin: 15px 0;">Поздравляем! Путь пройден!</p>
                <div class="final-score" id="victoryScore">0 баллов</div>
                <div class="prize" id="victoryQuote" style="margin: 15px 0;"></div>
                <button id="victoryResetBtn" class="modal-btn">Пройти заново</button>
            </div>
        </div>
    </div>
    
    <script>
        // ========== ДАННЫЕ ПО АВТОРАМ ==========
        const authorsData = {
            lermontov: {
                name: "М.Ю. Лермонтов",
                icon: "🏔️",
                desc: "«Герой нашего времени» • Кавказ • Дуэль",
                bgGradient: "linear-gradient(135deg, #3a5e3a 0%, #2c4a2c 100%)"
            },
            tolstoy: {
                name: "Л.Н. Толстой",
                icon: "⚔️",
                desc: "«Война и мир» • Бородино • Судьба России",
                bgGradient: "linear-gradient(135deg, #5d3a1a 0%, #8b5a2b 100%)"
            },
            bulgakov: {
                name: "М.А. Булгаков",
                icon: "🏙️",
                desc: "«Белая гвардия» • Киев 1918 • Дом Турбиных",
                bgGradient: "linear-gradient(135deg, #2c2c3a 0%, #1a1a2a 100%)"
            }
        };
        
        // Вопросы (обычные)
        const normalQuestions = {
            lermontov: [
                { text: "Как зовут главного героя романа «Герой нашего времени»?", options: ["Евгений Онегин", "Григорий Печорин", "Александр Чацкий", "Дмитрий Рудин"], correct: 1, explanation: "Печорин Григорий Александрович." },
                { text: "С кем Печорин стреляется на дуэли?", options: ["Максим Максимыч", "Грушницкий", "Вернер", "Княжна Мери"], correct: 1, explanation: "Дуэль с Грушницким." },
                { text: "Как зовут девушку, которую Печорин похищает?", options: ["Княжна Мери", "Вера", "Бэла", "Ундина"], correct: 2, explanation: "Бэла." },
                { text: "Кто рассказывает историю о Бэле?", options: ["Печорин", "Вернер", "Максим Максимыч", "Грушницкий"], correct: 2, explanation: "Максим Максимыч." },
                { text: "Какой тип представляет Печорин?", options: ["Лишний человек", "Маленький человек", "Романтический герой", "Герой-любовник"], correct: 0, explanation: "Лишний человек." }
            ],
            tolstoy: [
                { text: "Сколько томов в романе «Война и мир»?", options: ["3 тома", "4 тома", "5 томов", "6 томов"], correct: 1, explanation: "4 тома." },
                { text: "Кто командует русской армией при Бородино?", options: ["Наполеон", "Кутузов", "Багратион", "Барклай"], correct: 1, explanation: "Кутузов." },
                { text: "За кого выходит Наташа Ростова?", options: ["Андрей", "Пьер", "Анатоль", "Николай"], correct: 1, explanation: "За Пьера Безухова." },
                { text: "Кто такой Платон Каратаев?", options: ["Враг", "Учитель", "Сослуживец", "Родственник"], correct: 1, explanation: "Символ мудрости." },
                { text: "Главная мысль романа?", options: ["Героизм", "Роль народа", "Любовь", "Критика"], correct: 1, explanation: "Историей движет народ." }
            ],
            bulgakov: [
                { text: "Дом Турбиных находится на...", options: ["Набережной", "Алексеевском спуске", "Крещатике", "Подоле"], correct: 1, explanation: "Алексеевский спуск, 13." },
                { text: "Символ дома Турбиных?", options: ["Кремовые шторы", "Библиотека", "Рояль", "Печка"], correct: 0, explanation: "Кремовые шторы." },
                { text: "Кто спасает Алексея Турбина?", options: ["Елена", "Юлия Рейс", "Николка", "Мышлаевский"], correct: 1, explanation: "Юлия Рейс." },
                { text: "Кто погибает, спасая юнкеров?", options: ["Алексей", "Николка", "Най-Турс", "Мышлаевский"], correct: 2, explanation: "Най-Турс." },
                { text: "Финальная фраза романа?", options: ["Всё пройдёт", "Звёзды останутся", "Всё будет правильно", "Мир построен"], correct: 1, explanation: "«Но звёзды останутся»." }
            ]
        };
        
        // Вопросы на время (+20 баллов)
        const timedQuestions = {
            lermontov: [
                { text: "В какой главе романа происходит история с контрабандистами?", options: ["Бэла", "Максим Максимыч", "Тамань", "Княжна Мери"], correct: 2, explanation: "Тамань." },
                { text: "Кто убивает Вулича в романе?", options: ["Печорин", "Грушницкий", "Пьяный казак", "Контрабандисты"], correct: 2, explanation: "Пьяный казак." },
                { text: "Как Печорин относится к судьбе?", options: ["Верит", "Не верит", "Сомневается", "Игнорирует"], correct: 0, explanation: "Верит в предопределение." },
                { text: "Где происходит глава «Княжна Мери»?", options: ["Тамань", "Пятигорск", "Кисловодск", "Тифлис"], correct: 1, explanation: "Пятигорск." },
                { text: "Что происходит с Печориным в конце?", options: ["Женится", "Умирает в Персии", "Становится генералом", "Эмигрирует"], correct: 1, explanation: "Умирает в Персии." }
            ],
            tolstoy: [
                { text: "Что с Андреем Болконским?", options: ["Женится", "Умирает от ранения", "Эмигрирует", "Декабрист"], correct: 1, explanation: "Умирает от ранения." },
                { text: "Фамилия Наташи?", options: ["Болконская", "Курагина", "Ростова", "Безухова"], correct: 2, explanation: "Ростова." },
                { text: "Кто отдал подводы для раненых?", options: ["Андрей", "Пьер", "Наташа", "Кутузов"], correct: 2, explanation: "Наташа." },
                { text: "Главное сражение романа?", options: ["Аустерлиц", "Шенграбен", "Бородино", "Тарутино"], correct: 2, explanation: "Бородино." },
                { text: "Что символизирует дуб?", options: ["Смерть", "Возрождение", "Старость", "Войну"], correct: 1, explanation: "Возрождение Андрея." }
            ],
            bulgakov: [
                { text: "Как зовут сестру Турбиных?", options: ["Наташа", "Елена", "Анна", "Варвара"], correct: 1, explanation: "Елена." },
                { text: "Порядок смены власти в Киеве?", options: ["Б→Г→П", "Г→П→Б", "П→Г→Б", "Б→П→Г"], correct: 1, explanation: "Гетман→Петлюра→Большевики." },
                { text: "Что снится Алексею после ранения?", options: ["Война", "Рай", "Дом", "Любовь"], correct: 1, explanation: "Рай, где все равны." },
                { text: "Профессия Алексея Турбина?", options: ["Врач", "Военный", "Писатель", "Адвокат"], correct: 0, explanation: "Врач." },
                { text: "Что с Николкой в финале?", options: ["Погибает", "Эмигрирует", "Остаётся", "Женится"], correct: 2, explanation: "Остаётся в Киеве." }
            ]
        };
        
        // Карта поля 5x5
        const boardType = [
            ["🎮", "❓", "🔗", "❓", "⬜"],
            ["❓", "⬜", "📌", "🔗", "❓"],
            ["🔗", "❓", "⬜", "❓", "🔗"],
            ["📌", "⬜", "❓", "⬜", "📌"],
            ["❓", "🔗", "❓", "⬜", "🏅"]
        ];
        
        // Преобразуем в линейный массив
        const linearBoard = [];
        for (let i = 0; i < 5; i++) {
            for (let j = 0; j < 5; j++) {
                linearBoard.push({
                    row: i,
                    col: j,
                    type: boardType[i][j],
                    index: linearBoard.length
                });
            }
        }
        
        const TOTAL_CELLS = 25;
        let currentCell = 0;
        let score = 0;
        let lives = 3;
        let moves = 0;
        let passedCells = [0];
        let awaitingAnswer = false;
        let currentQuestion = null;
        let pendingTargetCell = null;
        let isTimedQuestion = false;
        let timerInterval = null;
        let timeLeft = 10;
        let gameActive = true;
        
        const author = localStorage.getItem('boardAuthor');
        if (!author || !authorsData[author]) {
            alert('Пожалуйста, выберите автора в главном меню');
            window.location.href = 'index.html';
        }
        
        const data = authorsData[author];
        document.getElementById('boardBody').style.background = data.bgGradient;
        document.getElementById('boardIcon').textContent = data.icon;
        document.getElementById('boardTitle').textContent = data.name;
        document.getElementById('boardDesc').textContent = data.desc;
        
        const normalQ = normalQuestions[author];
        const timedQ = timedQuestions[author];
        
        const gridContainer = document.getElementById('gridContainer');
        const livesSpan = document.getElementById('lives');
        const scoreSpan = document.getElementById('score');
        const movesSpan = document.getElementById('moves');
        
        // Модальные окна
        const questionModal = document.getElementById('questionModal');
        const defeatModal = document.getElementById('defeatModal');
        const victoryModal = document.getElementById('victoryModal');
        const modalCloseBtn = document.getElementById('modalCloseBtn');
        const defeatCloseBtn = document.getElementById('defeatCloseBtn');
        const victoryCloseBtn = document.getElementById('victoryCloseBtn');
        const defeatResetBtn = document.getElementById('defeatResetBtn');
        const victoryResetBtn = document.getElementById('victoryResetBtn');
        
        function closeAllModals() {
            questionModal.classList.remove('active');
            defeatModal.classList.remove('active');
            victoryModal.classList.remove('active');
        }
        
        modalCloseBtn.addEventListener('click', () => {
            questionModal.classList.remove('active');
            stopTimer();
            awaitingAnswer = false;
        });
        
        defeatCloseBtn.addEventListener('click', () => defeatModal.classList.remove('active'));
        victoryCloseBtn.addEventListener('click', () => victoryModal.classList.remove('active'));
        
        defeatResetBtn.addEventListener('click', () => {
            defeatModal.classList.remove('active');
            resetGame();
        });
        
        victoryResetBtn.addEventListener('click', () => {
            victoryModal.classList.remove('active');
            resetGame();
        });
        
        window.addEventListener('click', (e) => {
            if (e.target === questionModal) {
                questionModal.classList.remove('active');
                stopTimer();
                awaitingAnswer = false;
            }
            if (e.target === defeatModal) defeatModal.classList.remove('active');
            if (e.target === victoryModal) victoryModal.classList.remove('active');
        });
        
        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }
        
        function getAvailableNeighbors(cellIndex) {
            const cell = linearBoard[cellIndex];
            const neighbors = [];
            if (cell.row > 0) {
                const upIndex = (cell.row - 1) * 5 + cell.col;
                if (!passedCells.includes(upIndex)) neighbors.push(upIndex);
            }
            if (cell.row < 4) {
                const downIndex = (cell.row + 1) * 5 + cell.col;
                if (!passedCells.includes(downIndex)) neighbors.push(downIndex);
            }
            if (cell.col > 0) {
                const leftIndex = cell.row * 5 + (cell.col - 1);
                if (!passedCells.includes(leftIndex)) neighbors.push(leftIndex);
            }
            if (cell.col < 4) {
                const rightIndex = cell.row * 5 + (cell.col + 1);
                if (!passedCells.includes(rightIndex)) neighbors.push(rightIndex);
            }
            return neighbors;
        }
        
        function updateUI() {
            livesSpan.textContent = lives;
            scoreSpan.textContent = score;
            movesSpan.textContent = moves;
            drawGrid();
            
            if (!gameActive) return;
            
            if (lives <= 0) {
                gameActive = false;
                document.getElementById('defeatScore').textContent = `${score} баллов`;
                defeatModal.classList.add('active');
                return;
            }
            
            if (currentCell === TOTAL_CELLS - 1) {
                gameActive = false;
                const totalPossible = 25 * 10;
                const percent = (score / totalPossible) * 100;
                let prizeQuote = percent >= 80 ? "Блестяще! Вы настоящий знаток литературы!" : (percent >= 50 ? "Неплохо! Но есть куда расти." : "Перечитайте произведения и попробуйте снова!");
                document.getElementById('victoryScore').textContent = `${score} баллов`;
                document.getElementById('victoryQuote').textContent = prizeQuote;
                victoryModal.classList.add('active');
                return;
            }
        }
        
        function getIconForType(type, isCurrent = false) {
            if (isCurrent) return '🎮';
            switch(type) {
                case '🎮': return '🎮';
                case '❓': return '❓';
                case '🔗': return '🔗';
                case '📌': return '📌';
                case '⬜': return '⬜';
                case '🏅': return '🏅';
                default: return '❓';
            }
        }
        
        function drawGrid() {
            gridContainer.innerHTML = '';
            const neighbors = getAvailableNeighbors(currentCell);
            
            for (let i = 0; i < TOTAL_CELLS; i++) {
                const cell = linearBoard[i];
                const cellDiv = document.createElement('div');
                cellDiv.classList.add('cell');
                
                const isCurrent = (i === currentCell);
                const icon = getIconForType(cell.type, isCurrent);
                
                cellDiv.innerHTML = `<div class="cell-icon">${icon}</div>`;
                
                if (passedCells.includes(i) && i !== currentCell) {
                    cellDiv.classList.add('passed');
                } else if (i === currentCell) {
                    cellDiv.classList.add('current');
                } else if (neighbors.includes(i) && gameActive) {
                    cellDiv.classList.add('available');
                    cellDiv.addEventListener('click', () => moveToCell(i));
                } else {
                    cellDiv.classList.add('locked');
                }
                
                gridContainer.appendChild(cellDiv);
            }
        }
        
        function moveToCell(targetCell) {
            if (awaitingAnswer) return;
            if (!gameActive) return;
            
            const neighbors = getAvailableNeighbors(currentCell);
            if (!neighbors.includes(targetCell)) return;
            
            const cellType = linearBoard[targetCell].type;
            pendingTargetCell = targetCell;
            
            if (cellType === '🔗') {
                score += 5;
                moves++;
                currentCell = targetCell;
                if (!passedCells.includes(targetCell)) passedCells.push(targetCell);
                updateUI();
                return;
            } else if (cellType === '📌') {
                lives--;
                moves++;
                currentCell = targetCell;
                if (!passedCells.includes(targetCell)) passedCells.push(targetCell);
                updateUI();
                return;
            } else if (cellType === '⬜') {
                moves++;
                currentCell = targetCell;
                if (!passedCells.includes(targetCell)) passedCells.push(targetCell);
                updateUI();
                return;
            } else if (cellType === '🏅') {
                moves++;
                currentCell = targetCell;
                if (!passedCells.includes(targetCell)) passedCells.push(targetCell);
                updateUI();
                return;
            }
            
            // Тип '❓' - вопрос
            const isTimed = Math.random() < 0.5;
            let question = null;
            let pointsValue = 10;
            
            if (isTimed && timedQ && timedQ.length > 0) {
                const randomIndex = Math.floor(Math.random() * timedQ.length);
                question = timedQ[randomIndex];
                pointsValue = 20;
                isTimedQuestion = true;
            } else {
                const randomIndex = Math.floor(Math.random() * normalQ.length);
                question = normalQ[randomIndex];
                pointsValue = 10;
                isTimedQuestion = false;
            }
            
            if (!question) return;
            
            currentQuestion = question;
            awaitingAnswer = true;
            
            showModalQuestion(question, pointsValue, isTimedQuestion);
        }
        
        function showModalQuestion(question, pointsValue, isTimed) {
            const optionsHtml = question.options.map((opt, idx) => 
                `<div class="modal-option" data-opt="${idx}">${opt}</div>`
            ).join('');
            
            let timerHtml = '';
            if (isTimed) {
                timerHtml = `
                    <div class="timer-area">
                        <div style="font-size: 16px; color: #bc4742; font-weight: bold;">⚠️ ВНИМАНИЕ! Вопрос на время! ⚠️</div>
                        <div class="timer-display" id="modalTimerDisplay">10</div>
                        <div style="font-size: 14px; color: #666;">Осталось секунд</div>
                    </div>
                `;
            }
            
            document.getElementById('modalTitle').innerHTML = isTimed ? `⏱️ Вопрос на время! +${pointsValue} баллов` : `📖 Обычный вопрос +${pointsValue} баллов`;
            
            document.getElementById('modalBody').innerHTML = `
                <div class="question-text">${question.text}</div>
                ${timerHtml}
                <div class="options-grid" id="modalOptions">${optionsHtml}</div>
                <div id="modalFeedback" class="modal-feedback"></div>
            `;
            
            questionModal.classList.add('active');
            
            if (isTimed) {
                timeLeft = 10;
                const timerDisplay = document.getElementById('modalTimerDisplay');
                if (timerDisplay) timerDisplay.textContent = timeLeft;
                
                timerInterval = setInterval(() => {
                    if (!awaitingAnswer) return;
                    timeLeft--;
                    if (timerDisplay) {
                        timerDisplay.textContent = timeLeft;
                        if (timeLeft <= 3) {
                            timerDisplay.classList.add('warning');
                        }
                        if (timeLeft <= 0) {
                            clearInterval(timerInterval);
                            timerInterval = null;
                            if (awaitingAnswer) {
                                handleAnswer(false, null, true);
                            }                            }
                        }
                    }, 1000);
                }
            }
            
            // Назначаем обработчики на варианты ответов
            setTimeout(() => {
                const modalOptions = document.querySelectorAll('#modalOptions .modal-option');
                modalOptions.forEach(opt => {
                    opt.addEventListener('click', (e) => {
                        if (!awaitingAnswer) return;
                        const selected = parseInt(opt.dataset.opt);
                        const isCorrect = (selected === question.correct);
                        handleAnswer(isCorrect, question.explanation, isTimed);
                    });
                });
            }, 10);
        }
        
        function handleAnswer(isCorrect, explanation, isTimed) {
            if (!awaitingAnswer) return;
            
            if (isTimed) {
                stopTimer();
            }
            
            const feedbackDiv = document.getElementById('modalFeedback');
            const pointsValue = isTimed ? 20 : 10;
            
            if (isCorrect) {
                score += pointsValue;
                moves++;
                currentCell = pendingTargetCell;
                if (!passedCells.includes(pendingTargetCell)) passedCells.push(pendingTargetCell);
                feedbackDiv.innerHTML = `✅ Правильно! +${pointsValue} баллов. ${explanation}`;
                feedbackDiv.classList.add('correct');
                
                setTimeout(() => {
                    questionModal.classList.remove('active');
                    awaitingAnswer = false;
                    updateUI();
                }, 1500);
            } else {
                lives--;
                if (explanation) {
                    feedbackDiv.innerHTML = `❌ Неправильно. ${explanation} -1 жизнь.`;
                } else {
                    feedbackDiv.innerHTML = `⏰ Время вышло! -1 жизнь.`;
                }
                feedbackDiv.classList.add('wrong');
                
                setTimeout(() => {
                    questionModal.classList.remove('active');
                    awaitingAnswer = false;
                    updateUI();
                }, 1500);
            }
        }
        
        function resetGame() {
            gameActive = true;
            currentCell = 0;
            score = 0;
            lives = 3;
            moves = 0;
            passedCells = [0];
            awaitingAnswer = false;
            pendingTargetCell = null;
            stopTimer();
            updateUI();
        }
        
        // Инициализация
        updateUI();
    </script>
</body>
</html>
