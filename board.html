<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Литературная бродилка 5x5</title>
    <link rel="stylesheet" href="style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Montserrat', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            padding: 20px;
            background: linear-gradient(135deg, #0a0f0a 0%, #1a2a1a 100%);
        }

        .board-container {
            max-width: 750px;
            margin: 0 auto;
            background: rgba(255,248,225,0.95);
            border-radius: 32px;
            padding: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        /* Верхняя панель */
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f7d44a;
            flex-wrap: wrap;
            gap: 10px;
        }

        .back-btn {
            background: #8b5a2b;
            color: white;
            text-decoration: none;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: #5a3a1a;
            transform: translateX(-3px);
        }

        .stats-panel {
            display: flex;
            gap: 20px;
        }

        .stat {
            background: #f7d44a20;
            padding: 8px 18px;
            border-radius: 30px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat span:first-child {
            font-size: 20px;
        }

        .stat span:last-child {
            color: #2c5530;
            font-size: 20px;
            font-weight: bold;
        }

        /* Локация (автор) */
        .location {
            text-align: center;
            margin-bottom: 25px;
            padding: 15px;
            background: linear-gradient(135deg, #f7d44a20, transparent);
            border-radius: 20px;
        }

        .location-icon {
            font-size: 56px;
        }

        .location h3 {
            font-size: 28px;
            color: #2c5530;
            margin-top: 10px;
        }

        .location-desc {
            font-size: 14px;
            color: #5a4a2e;
            margin-top: 5px;
        }

        /* Поле 5x5 */
        .grid-5x5 {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin: 30px 0;
            justify-items: center;
            align-items: center;
        }

        .cell {
            width: 100%;
            aspect-ratio: 1 / 1;
            max-width: 75px;
            background: #c0b88a;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            transition: all 0.2s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            cursor: default;
            color: #5a4a2e;
            text-align: center;
            padding: 8px;
        }

        .cell .cell-icon {
            font-size: 28px;
            margin-bottom: 4px;
        }

        .cell .cell-number {
            font-size: 11px;
            opacity: 0.8;
        }

        .cell.passed {
            background: #2c5530;
            color: white;
        }

        .cell.current {
            background: #f7d44a;
            transform: scale(1.05);
            box-shadow: 0 0 15px gold;
            color: #2c5530;
        }

        .cell.current .cell-icon {
            font-size: 32px;
        }

        .cell.next {
            background: #90be6d;
            cursor: pointer;
            color: white;
        }

        .cell.next:hover {
            background: #6a994e;
            transform: scale(1.02);
        }

        .cell.locked {
            background: #aaa;
            color: #666;
            cursor: not-allowed;
        }

        /* Легенда */
        .legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
            padding: 15px;
            background: #f0e8d0;
            border-radius: 50px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #2c5530;
        }

        .legend-icon {
            font-size: 20px;
        }

        /* Вопросы */
        .question-area {
            margin-top: 20px;
            padding: 20px;
            background: #fff;
            border-radius: 24px;
            animation: fadeIn 0.3s;
        }

        .question-book {
            display: inline-block;
            background: #f7d44a;
            color: #2c5530;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .question-text {
            font-size: 18px;
            line-height: 1.4;
            color: #2c2c2c;
            margin-bottom: 20px;
            font-weight: 500;
            background: #f9f5e8;
            padding: 15px;
            border-radius: 16px;
        }

        .options-grid {
            display: grid;
            gap: 10px;
            margin-top: 15px;
        }

        .board-option {
            background: linear-gradient(135deg, #f5f0e3 0%, #efe6d4 100%);
            padding: 12px 18px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            border: 2px solid transparent;
        }

        .board-option:hover:not(.disabled) {
            background: #f7d44a;
            transform: translateX(5px);
        }

        .board-option.correct {
            background: linear-gradient(135deg, #90be6d, #6a994e);
            color: white;
        }

        .board-option.wrong {
            background: linear-gradient(135deg, #e76f51, #bc4742);
            color: white;
        }

        .board-option.disabled {
            pointer-events: none;
            opacity: 0.7;
        }

        .feedback {
            margin-top: 15px;
            padding: 10px;
            border-radius: 12px;
            font-size: 14px;
        }

        .feedback.correct-feedback {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid #28a745;
        }

        .feedback.wrong-feedback {
            background: #f8d7da;
            color: #721c24;
            border-left: 4px solid #dc3545;
        }

        .final-screen {
            text-align: center;
            padding: 30px;
        }

        .final-icon {
            font-size: 70px;
            margin-bottom: 15px;
        }

        .final-screen h2 {
            font-size: 28px;
            color: #2c5530;
            margin-bottom: 15px;
        }

        .final-score {
            font-size: 30px;
            font-weight: bold;
            color: #f7d44a;
            background: #2c5530;
            display: inline-block;
            padding: 8px 25px;
            border-radius: 50px;
            margin: 15px 0;
        }

        .prize {
            background: #f7d44a;
            padding: 15px;
            border-radius: 20px;
            margin: 20px 0;
            font-style: italic;
            font-size: 16px;
            color: #2c5530;
        }

        .reset-btn {
            background: #8b5a2b;
            color: white;
            text-decoration: none;
            padding: 10px 25px;
            border-radius: 40px;
            display: inline-block;
            margin-top: 15px;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
        }

        .reset-btn:hover {
            background: #5a3a1a;
            transform: scale(1.05);
        }

        /* Таймер */
        .timer-question {
            background: #fff3e0;
            border-left: 6px solid #f7d44a;
            padding: 15px;
            margin: 15px 0;
            border-radius: 20px;
        }

        .timer-display {
            font-size: 32px;
            font-weight: bold;
            text-align: center;
            color: #e76f51;
            margin: 10px 0;
        }

        .timer-warning {
            animation: timerPulse 0.5s ease-in-out infinite;
        }

        @keyframes timerPulse {
            0%, 100% { transform: scale(1); color: #e76f51; }
            50% { transform: scale(1.1); color: #bc4742; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .grid-5x5 { gap: 6px; }
            .cell .cell-icon { font-size: 20px; }
            .cell .cell-number { font-size: 9px; }
            .legend { gap: 10px; }
            .legend-item { font-size: 11px; }
        }
    </style>
</head>
<body id="boardBody">
    <div class="board-container">
        <div class="game-header">
            <a href="index.html" class="back-btn">← Главное меню</a>
            <div class="stats-panel">
                <div class="stat"><span>❤️</span><span id="lives">3</span></div>
                <div class="stat"><span>⭐</span><span id="score">0</span></div>
                <div class="stat"><span>🚶</span><span id="moves">0</span></div>
            </div>
        </div>
        
        <div class="location" id="location">
            <div class="location-icon" id="boardIcon">📖</div>
            <h3 id="boardTitle">Загрузка...</h3>
            <p class="location-desc" id="boardDesc"></p>
        </div>
        
        <!-- Поле 5x5 -->
        <div class="grid-5x5" id="gridContainer"></div>
        
        <!-- Легенда -->
        <div class="legend">
            <div class="legend-item"><span class="legend-icon">🎮</span> <span>Ты здесь</span></div>
            <div class="legend-item"><span class="legend-icon">❓</span> <span>Вопрос (+10/20)</span></div>
            <div class="legend-item"><span class="legend-icon">🔗</span> <span>Бонус (+5)</span></div>
            <div class="legend-item"><span class="legend-icon">📌</span> <span>Ловушка (-1 жизнь)</span></div>
            <div class="legend-item"><span class="legend-icon">⬜</span> <span>Пусто (+0)</span></div>
            <div class="legend-item"><span class="legend-icon">🏅</span> <span>Финиш</span></div>
        </div>
        
        <div id="questionPanel" class="question-area"></div>
    </div>
    
    <script>
        // ========== ДАННЫЕ ПО АВТОРАМ ==========
        const authorsData = {
            lermontov: {
                name: "М.Ю. Лермонтов",
                icon: "🏔️",
                desc: "«Герой нашего времени» • Кавказ • Дуэль",
                bgGradient: "linear-gradient(135deg, #3a5e3a 0%, #2c4a2c 100%)"
            },
            tolstoy: {
                name: "Л.Н. Толстой",
                icon: "⚔️",
                desc: "«Война и мир» • Бородино • Судьба России",
                bgGradient: "linear-gradient(135deg, #5d3a1a 0%, #8b5a2b 100%)"
            },
            bulgakov: {
                name: "М.А. Булгаков",
                icon: "🏙️",
                desc: "«Белая гвардия» • Киев 1918 • Дом Турбиных",
                bgGradient: "linear-gradient(135deg, #2c2c3a 0%, #1a1a2a 100%)"
            }
        };
        
        // Вопросы (обычные)
        const normalQuestions = {
            lermontov: [
                { text: "Как зовут главного героя романа «Герой нашего времени»?", options: ["Евгений Онегин", "Григорий Печорин", "Александр Чацкий", "Дмитрий Рудин"], correct: 1, explanation: "Печорин Григорий Александрович." },
                { text: "С кем Печорин стреляется на дуэли?", options: ["Максим Максимыч", "Грушницкий", "Вернер", "Княжна Мери"], correct: 1, explanation: "Дуэль с Грушницким." },
                { text: "Как зовут девушку, которую Печорин похищает?", options: ["Княжна Мери", "Вера", "Бэла", "Ундина"], correct: 2, explanation: "Бэла." },
                { text: "Кто рассказывает историю о Бэле?", options: ["Печорин", "Вернер", "Максим Максимыч", "Грушницкий"], correct: 2, explanation: "Максим Максимыч." },
                { text: "Какой тип представляет Печорин?", options: ["Лишний человек", "Маленький человек", "Романтический герой", "Герой-любовник"], correct: 0, explanation: "Лишний человек." }
            ],
            tolstoy: [
                { text: "Сколько томов в романе «Война и мир»?", options: ["3 тома", "4 тома", "5 томов", "6 томов"], correct: 1, explanation: "4 тома." },
                { text: "Кто командует русской армией при Бородино?", options: ["Наполеон", "Кутузов", "Багратион", "Барклай"], correct: 1, explanation: "Кутузов." },
                { text: "За кого выходит Наташа Ростова?", options: ["Андрей", "Пьер", "Анатоль", "Николай"], correct: 1, explanation: "За Пьера Безухова." },
                { text: "Кто такой Платон Каратаев?", options: ["Враг", "Учитель", "Сослуживец", "Родственник"], correct: 1, explanation: "Символ мудрости." },
                { text: "Главная мысль романа?", options: ["Героизм", "Роль народа", "Любовь", "Критика"], correct: 1, explanation: "Историей движет народ." }
            ],
            bulgakov: [
                { text: "Дом Турбиных находится на...", options: ["Набережной", "Алексеевском спуске", "Крещатике", "Подоле"], correct: 1, explanation: "Алексеевский спуск, 13." },
                { text: "Символ дома Турбиных?", options: ["Кремовые шторы", "Библиотека", "Рояль", "Печка"], correct: 0, explanation: "Кремовые шторы." },
                { text: "Кто спасает Алексея Турбина?", options: ["Елена", "Юлия Рейс", "Николка", "Мышлаевский"], correct: 1, explanation: "Юлия Рейс." },
                { text: "Кто погибает, спасая юнкеров?", options: ["Алексей", "Николка", "Най-Турс", "Мышлаевский"], correct: 2, explanation: "Най-Турс." },
                { text: "Финальная фраза романа?", options: ["Всё пройдёт", "Звёзды останутся", "Всё будет правильно", "Мир построен"], correct: 1, explanation: "«Но звёзды останутся»." }
            ]
        };
        
        // Вопросы на время (+20 баллов)
        const timedQuestions = {
            lermontov: [
                { text: "В какой главе романа происходит история с контрабандистами?", options: ["Бэла", "Максим Максимыч", "Тамань", "Княжна Мери"], correct: 2, explanation: "Тамань.", timeLimit: 10, points: 20 },
                { text: "Кто убивает Вулича в романе?", options: ["Печорин", "Грушницкий", "Пьяный казак", "Контрабандисты"], correct: 2, explanation: "Пьяный казак.", timeLimit: 10, points: 20 },
                { text: "Как Печорин относится к судьбе?", options: ["Верит", "Не верит", "Сомневается", "Игнорирует"], correct: 0, explanation: "Верит в предопределение.", timeLimit: 10, points: 20 },
                { text: "Где происходит глава «Княжна Мери»?", options: ["Тамань", "Пятигорск", "Кисловодск", "Тифлис"], correct: 1, explanation: "Пятигорск.", timeLimit: 10, points: 20 },
                { text: "Что происходит с Печориным в конце?", options: ["Женится", "Умирает в Персии", "Становится генералом", "Эмигрирует"], correct: 1, explanation: "Умирает в Персии.", timeLimit: 10, points: 20 }
            ],
            tolstoy: [
                { text: "Что с Андреем Болконским?", options: ["Женится", "Умирает от ранения", "Эмигрирует", "Декабрист"], correct: 1, explanation: "Умирает от ранения.", timeLimit: 10, points: 20 },
                { text: "Фамилия Наташи?", options: ["Болконская", "Курагина", "Ростова", "Безухова"], correct: 2, explanation: "Ростова.", timeLimit: 10, points: 20 },
                { text: "Кто отдал подводы для раненых?", options: ["Андрей", "Пьер", "Наташа", "Кутузов"], correct: 2, explanation: "Наташа.", timeLimit: 10, points: 20 },
                { text: "Главное сражение романа?", options: ["Аустерлиц", "Шенграбен", "Бородино", "Тарутино"], correct: 2, explanation: "Бородино.", timeLimit: 10, points: 20 },
                { text: "Что символизирует дуб?", options: ["Смерть", "Возрождение", "Старость", "Войну"], correct: 1, explanation: "Возрождение Андрея.", timeLimit: 10, points: 20 }
            ],
            bulgakov: [
                { text: "Как зовут сестру Турбиных?", options: ["Наташа", "Елена", "Анна", "Варвара"], correct: 1, explanation: "Елена.", timeLimit: 10, points: 20 },
                { text: "Порядок смены власти в Киеве?", options: ["Б→Г→П", "Г→П→Б", "П→Г→Б", "Б→П→Г"], correct: 1, explanation: "Гетман→Петлюра→Большевики.", timeLimit: 10, points: 20 },
                { text: "Что снится Алексею после ранения?", options: ["Война", "Рай", "Дом", "Любовь"], correct: 1, explanation: "Рай, где все равны.", timeLimit: 10, points: 20 },
                { text: "Профессия Алексея Турбина?", options: ["Врач", "Военный", "Писатель", "Адвокат"], correct: 0, explanation: "Врач.", timeLimit: 10, points: 20 },
                { text: "Что с Николкой в финале?", options: ["Погибает", "Эмигрирует", "Остаётся", "Женится"], correct: 2, explanation: "Остаётся в Киеве.", timeLimit: 10, points: 20 }
            ]
        };
        
        // Карта поля 5x5 (25 клеток)
        // 🎮 - старт (клетка 0)
        // ❓ - вопрос (обычный или на время случайно)
        // 🔗 - бонус (+5 очков)
        // 📌 - ловушка (-1 жизнь)
        // ⬜ - пусто (ничего)
        // 🏅 - финиш (последняя клетка)
        const boardType = [
            ["🎮", "❓", "🔗", "❓", "⬜"],
            ["❓", "⬜", "📌", "🔗", "❓"],
            ["🔗", "❓", "⬜", "❓", "🔗"],
            ["📌", "⬜", "❓", "⬜", "📌"],
            ["❓", "🔗", "❓", "⬜", "🏅"]
        ];
        
        // Преобразуем в линейный массив
        const linearBoard = [];
        for (let i = 0; i < 5; i++) {
            for (let j = 0; j < 5; j++) {
                linearBoard.push({
                    row: i,
                    col: j,
                    type: boardType[i][j],
                    index: linearBoard.length
                });
            }
        }
        
        const TOTAL_CELLS = 25;
        let currentCell = 0;
        let score = 0;
        let lives = 3;
        let moves = 0;
        let passedCells = [0];
        let awaitingAnswer = false;
        let currentQuestion = null;
        let pendingTargetCell = null;
        let isTimedQuestion = false;
        let timerInterval = null;
        let timeLeft = 10;
        
        const author = localStorage.getItem('boardAuthor');
        if (!author || !authorsData[author]) {
            alert('Пожалуйста, выберите автора в главном меню');
            window.location.href = 'index.html';
        }
        
        const data = authorsData[author];
        document.getElementById('boardBody').style.background = data.bgGradient;
        document.getElementById('boardIcon').textContent = data.icon;
        document.getElementById('boardTitle').textContent = data.name;
        document.getElementById('boardDesc').textContent = data.desc;
        
        const normalQ = normalQuestions[author];
        const timedQ = timedQuestions[author];
        
        const gridContainer = document.getElementById('gridContainer');
        const questionPanel = document.getElementById('questionPanel');
        const livesSpan = document.getElementById('lives');
        const scoreSpan = document.getElementById('score');
        const movesSpan = document.getElementById('moves');
        
        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }
        
        function startTimer(onTimeout) {
            stopTimer();
            timeLeft = 10;
            const timerDiv = document.getElementById('timerDisplay');
            if (timerDiv) timerDiv.textContent = timeLeft;
            
            timerInterval = setInterval(() => {
                if (!awaitingAnswer) return;
                timeLeft--;
                if (timerDiv) {
                    timerDiv.textContent = timeLeft;
                    if (timeLeft <= 3) timerDiv.classList.add('timer-warning');
                    else timerDiv.classList.remove('timer-warning');
                }
                if (timeLeft <= 0) {
                    stopTimer();
                    onTimeout();
                }
            }, 1000);
        }
        
        function updateUI() {
            livesSpan.textContent = lives;
            scoreSpan.textContent = score;
            movesSpan.textContent = moves;
            drawGrid();
            
            if (lives <= 0) {
                questionPanel.innerHTML = `
                    <div class="final-screen">
                        <div class="final-icon">💀</div>
                        <h2>Поражение...</h2>
                        <p>У вас закончились жизни!</p>
                        <div class="final-score">${score} баллов</div>
                        <button id="resetBoardBtn" class="reset-btn">Начать заново</button>
                    </div>
                `;
                document.getElementById('resetBoardBtn')?.addEventListener('click', () => resetGame());
                return;
            }
            
            if (currentCell === TOTAL_CELLS - 1) {
                const totalPossible = 25 * 10;
                const percent = (score / totalPossible) * 100;
                let prizeQuote = percent >= 80 ? "Блестяще! Вы настоящий знаток литературы!" : (percent >= 50 ? "Неплохо! Но есть куда расти." : "Перечитайте произведения и попробуйте снова!");
                questionPanel.innerHTML = `
                    <div class="final-screen">
                        <div class="final-icon">🏆</div>
                        <h2>Поздравляем! Путь пройден!</h2>
                        <div class="final-score">${score} баллов</div>
                        <div class="prize">${prizeQuote}</div>
                        <button id="resetBoardBtn" class="reset-btn">Пройти заново</button>
                    </div>
                `;
                document.getElementById('resetBoardBtn')?.addEventListener('click', () => resetGame());
                return;
            }
        }
        
        function getIconForType(type) {
            switch(type) {
                case '🎮': return '🎮';
                case '❓': return '❓';
                case '🔗': return '🔗';
                case '📌': return '📌';
                case '⬜': return '⬜';
                case '🏅': return '🏅';
                default: return '❓';
            }
        }
        
        function drawGrid() {
            gridContainer.innerHTML = '';
            for (let i = 0; i < TOTAL_CELLS; i++) {
                const cell = linearBoard[i];
                const cellDiv = document.createElement('div');
                cellDiv.classList.add('cell');
                
                let icon = getIconForType(cell.type);
                if (i === currentCell) icon = '🎮';
                
                cellDiv.innerHTML = `
                    <div class="cell-icon">${icon}</div>
                    <div class="cell-number">${cell.row+1},${cell.col+1}</div>
                `;
                
                if (passedCells.includes(i) && i !== currentCell) {
                    cellDiv.classList.add('passed');
                } else if (i === currentCell) {
                    cellDiv.classList.add('current');
                } else if (i === currentCell + 1 && !passedCells.includes(i)) {
                    cellDiv.classList.add('next');
                    if (!awaitingAnswer && lives > 0) {
                        cellDiv.addEventListener('click', () => askQuestion(i));
                    }
                } else if (i > currentCell) {
                    cellDiv.classList.add('locked');
                }
                
                gridContainer.appendChild(cellDiv);
            }
        }
        
        function askQuestion(targetCell) {
            if (awaitingAnswer) return;
            if (lives <= 0) return;
            if (targetCell !== currentCell + 1) return;
            
            pendingTargetCell = targetCell;
            const cellType = linearBoard[targetCell].type;
            
            // Обработка разных типов клеток
            if (cellType === '🔗') {
                // Бонус
                score += 5;
                moves++;
                currentCell = targetCell;
                if (!passedCells.includes(targetCell)) passedCells.push(targetCell);
                updateUI();
                questionPanel.innerHTML = `<p style="text-align:center; padding:20px; color:#2c5530;">🔗 Бонус! +5 баллов. Переход на клетку (${Math.floor(targetCell/5)+1},${targetCell%5+1})!</p>`;
                setTimeout(() => {
                    if (lives > 0 && currentCell !== TOTAL_CELLS - 1) {
                        questionPanel.innerHTML = `<p style="text-align:center; padding:20px; color:#5a4a2e;">Нажмите на следующую доступную клетку, чтобы продолжить.</p>`;
                        drawGrid();
                    } else {
                        updateUI();
                    }
                }, 1500);
                return;
            } else if (cellType === '📌') {
                // Ловушка
                lives--;
                moves++;
                currentCell = targetCell;
                if (!passedCells.includes(targetCell)) passedCells.push(targetCell);
                updateUI();
                questionPanel.innerHTML = `<p style="text-align:center; padding:20px; color:#721c24;">📌 Ловушка! -1 жизнь. Переход на клетку (${Math.floor(targetCell/5)+1},${targetCell%5+1})!</p>`;
                setTimeout(() => {
                    if (lives > 0 && currentCell !== TOTAL_CELLS - 1) {
                        questionPanel.innerHTML = `<p style="text-align:center; padding:20px; color:#5a4a2e;">Нажмите на следующую доступную клетку, чтобы продолжить.</p>`;
                        drawGrid();
                    } else {
                        updateUI();
                    }
                }, 1500);
                return;
            } else if (cellType === '⬜') {
                // Пустая клетка
                moves++;
                currentCell = targetCell;
                if (!passedCells.includes(targetCell)) passedCells.push(targetCell);
                updateUI();
                questionPanel.innerHTML = `<p style="text-align:center; padding:20px; color:#2c5530;">⬜ Пустая клетка! Переход на клетку (${Math.floor(targetCell/5)+1},${targetCell%5+1})!</p>`;
                setTimeout(() => {
                    if (lives > 0 && currentCell !== TOTAL_CELLS - 1) {
                        questionPanel.innerHTML = `<p style="text-align:center; padding:20px; color:#5a4a2e;">Нажмите на следующую доступную клетку, чтобы продолжить.</p>`;
                        drawGrid();
                    } else {
                        updateUI();
                    }
                }, 1500);
                return;
            } else if (cellType === '🏅') {
                // Финиш
                moves++;
                currentCell = targetCell;
                if (!passedCells.includes(targetCell)) passedCells.push(targetCell);
                updateUI();
                return;
            }
            
            // Тип '❓' - вопрос (случайный: обычный или на время)
            const isTimed = Math.random() < 0.5; // 50% на timed
            let question = null;
            let pointsValue = 10;
            
            if (isTimed && timedQ && timedQ.length > 0) {
                const randomIndex = Math.floor(Math.random() * timedQ.length);
                question = timedQ[randomIndex];
                pointsValue = 20;
                isTimedQuestion = true;
            } else {
                const randomIndex = Math.floor(Math.random() * normalQ.length);
                question = normalQ[randomIndex];
                pointsValue = 10;
                isTimedQuestion = false;
            }
            
            if (!question) return;
            
            currentQuestion = question;
            awaitingAnswer = true;
            
            const optionsHtml = currentQuestion.options.map((opt, idx) => 
                `<div class="board-option" data-opt="${idx}">${opt}</div>`
            ).join('');
            
            let timerHtml = '';
            if (isTimedQuestion) {
                timerHtml = `
                    <div class="timer-question">
                        <div style="text-align:center;">⏱️ У вас есть 10 секунд! +20 баллов</div>
                        <div class="timer-display" id="timerDisplay">10</div>
                    </div>
                `;
            }
            
            questionPanel.innerHTML = `
                <div class="question-book">📖 ${isTimedQuestion ? 'Вопрос на время! +20 баллов' : 'Обычный вопрос +10 баллов'} (клетка ${Math.floor(targetCell/5)+1},${targetCell%5+1})</div>
                <div class="question-text">${currentQuestion.text}</div>
                ${timerHtml}
                <div class="options-grid" id="boardOptions">${optionsHtml}</div>
                <div id="boardFeedback" class="feedback"></div>
            `;
            
            if (isTimedQuestion) {
                startTimer(() => {
                    if (awaitingAnswer) {
                        lives--;
                        const feedbackDiv = document.getElementById('boardFeedback');
                        feedbackDiv.innerHTML = `⏰ Время вышло! Правильный ответ: «${currentQuestion.options[currentQuestion.correct]}». -1 жизнь.`;
                        feedbackDiv.className = 'feedback wrong-feedback';
                        awaitingAnswer = false;
                        stopTimer();
                        updateUI();
                        setTimeout(() => {
                            if (lives > 0 && currentCell !== TOTAL_CELLS - 1) {
                                questionPanel.innerHTML = `<p style="text-align:center; padding:20px; color:#721c24;">😔 Остались на клетке ${Math.floor(currentCell/5)+1},${currentCell%5+1}. Попробуйте снова нажать на следующую клетку.</p>`;
                                drawGrid();
                            } else {
                                updateUI();
                            }
                        }, 2000);
                    }
                });
            }
            
            document.querySelectorAll('.board-option').forEach(opt => {
                opt.addEventListener('click', (e) => {
                    if (!awaitingAnswer) return;
                    const selected = parseInt(opt.dataset.opt);
                    const isCorrect = (selected === currentQuestion.correct);
                    const feedbackDiv = document.getElementById('boardFeedback');
                    
                    if (isCorrect) {
                        if (isTimedQuestion) stopTimer();
                        const points = pointsValue;
                        score += points;
                        moves++;
                        currentCell = pendingTargetCell;
                        if (!passedCells.includes(pendingTargetCell)) passedCells.push(pendingTargetCell);
                        feedbackDiv.innerHTML = `✅ Правильно! +${points} баллов. ${currentQuestion.explanation}`;
                        feedbackDiv.className = 'feedback correct-feedback';
                        opt.classList.add('correct');
                        awaitingAnswer = false;
                        updateUI();
                        setTimeout(() => {
                            if (lives > 0 && currentCell !== TOTAL_CELLS - 1) {
                                questionPanel.innerHTML = `<p style="text-align:center; padding:20px; color:#2c5530;">✅ Переход на клетку (${Math.floor(currentCell/5)+1},${currentCell%5+1}) успешен!<br>Нажмите на следующую доступную клетку.</p>`;
                                drawGrid();
                            } else {
                                updateUI();
                            }
                        }, 1500);
                    } else {
                        if (isTimedQuestion) stopTimer();
                        lives--;
                        feedbackDiv.innerHTML = `❌ Неправильно. ${currentQuestion.explanation} -1 жизнь.`;
                        feedbackDiv.className = 'feedback wrong-feedback';
                        opt.classList.add('wrong');
                        awaitingAnswer = false;
                        updateUI();
                        setTimeout(() => {
                            if (lives > 0 && currentCell !== TOTAL_CELLS - 1) {
                                questionPanel.innerHTML = `<p style="text-align:center; padding:20px; color:#721c24;">😔 Остались на клетке ${Math.floor(currentCell/5)+1},${currentCell%5+1}. Попробуйте снова нажать на следующую клетку.</p>`;
                                drawGrid();
                            } else {
                                updateUI();
                            }
                        }, 2000);
                    }
                });
            });
        }
        
        function resetGame() {
            currentCell = 0;
            score = 0;
            lives = 3;
            moves = 0;
            passedCells = [0];
            awaitingAnswer = false;
            currentQuestion = null;
            pendingTargetCell = null;
            stopTimer();
            updateUI();
            questionPanel.innerHTML = `<p style="text-align:center; padding:20px; color:#5a4a2e;">🚀 Нажмите на следующую доступную клетку (зелёную), чтобы начать путь!</p>`;
            drawGrid();
        }
        
        // Инициализация
        updateUI();
        questionPanel.innerHTML = `<p style="text-align:center; padding:20px; color:#5a4a2e;">🚀 Нажмите на следующую доступную клетку (зелёную), чтобы начать путь!</p>`;
    </script>
</body>
</html>
