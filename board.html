<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Литературная бродилка</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .board-container {
            max-width: 700px;
            margin: 0 auto;
            background: rgba(255,248,225,0.95);
            border-radius: 32px;
            padding: 25px;
        }
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f7d44a;
            flex-wrap: wrap;
            gap: 10px;
        }
        .back-btn {
            background: #8b5a2b;
            color: white;
            text-decoration: none;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 14px;
            transition: all 0.3s;
        }
        .back-btn:hover {
            background: #5a3a1a;
            transform: translateX(-3px);
        }
        .stats-panel {
            display: flex;
            gap: 20px;
        }
        .stat {
            background: #f7d44a20;
            padding: 8px 18px;
            border-radius: 30px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .stat span:first-child {
            font-size: 20px;
        }
        .stat span:last-child {
            color: #2c5530;
            font-size: 20px;
            font-weight: bold;
        }
        .location {
            text-align: center;
            margin-bottom: 25px;
            padding: 15px;
            background: linear-gradient(135deg, #f7d44a20, transparent);
            border-radius: 20px;
        }
        .location-icon {
            font-size: 56px;
        }
        .location h3 {
            font-size: 28px;
            color: #2c5530;
            margin-top: 10px;
        }
        .location-desc {
            font-size: 14px;
            color: #5a4a2e;
            margin-top: 5px;
        }
        .path {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin: 40px 0;
        }
        .cell {
            width: 70px;
            height: 70px;
            background: #c0b88a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 24px;
            transition: all 0.2s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            cursor: default;
            color: #5a4a2e;
        }
        .cell.passed {
            background: #2c5530;
            color: white;
            cursor: default;
        }
        .cell.current {
            background: #f7d44a;
            transform: scale(1.1);
            box-shadow: 0 0 15px gold;
            color: #2c5530;
            cursor: default;
        }
        .cell.next {
            background: #90be6d;
            cursor: pointer;
            color: white;
        }
        .cell.next:hover {
            background: #6a994e;
            transform: scale(1.05);
        }
        .cell.locked {
            background: #aaa;
            color: #666;
            cursor: not-allowed;
        }
        .question-area {
            margin-top: 20px;
            padding: 20px;
            background: #fff;
            border-radius: 24px;
            animation: fadeIn 0.3s;
        }
        .question-book {
            display: inline-block;
            background: #f7d44a;
            color: #2c5530;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .question-text {
            font-size: 18px;
            line-height: 1.4;
            color: #2c2c2c;
            margin-bottom: 20px;
            font-weight: 500;
            background: #f9f5e8;
            padding: 15px;
            border-radius: 16px;
        }
        .options-grid {
            display: grid;
            gap: 10px;
            margin-top: 15px;
        }
        .board-option {
            background: linear-gradient(135deg, #f5f0e3 0%, #efe6d4 100%);
            padding: 12px 18px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            border: 2px solid transparent;
        }
        .board-option:hover {
            background: #f7d44a;
            transform: translateX(5px);
        }
        .board-option.correct {
            background: linear-gradient(135deg, #90be6d, #6a994e);
            color: white;
        }
        .board-option.wrong {
            background: linear-gradient(135deg, #e76f51, #bc4742);
            color: white;
        }
        .feedback {
            margin-top: 15px;
            padding: 10px;
            border-radius: 12px;
            font-size: 14px;
        }
        .feedback.correct-feedback {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid #28a745;
        }
        .feedback.wrong-feedback {
            background: #f8d7da;
            color: #721c24;
            border-left: 4px solid #dc3545;
        }
        .final-screen {
            text-align: center;
            padding: 30px;
        }
        .final-icon {
            font-size: 70px;
            margin-bottom: 15px;
        }
        .final-screen h2 {
            font-size: 28px;
            color: #2c5530;
            margin-bottom: 15px;
        }
        .final-score {
            font-size: 30px;
            font-weight: bold;
            color: #f7d44a;
            background: #2c5530;
            display: inline-block;
            padding: 8px 25px;
            border-radius: 50px;
            margin: 15px 0;
        }
        .prize {
            background: #f7d44a;
            padding: 15px;
            border-radius: 20px;
            margin: 20px 0;
            font-style: italic;
            font-size: 16px;
            color: #2c5530;
        }
        .reset-btn {
            background: #8b5a2b;
            color: white;
            text-decoration: none;
            padding: 10px 25px;
            border-radius: 40px;
            display: inline-block;
            margin-top: 15px;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
        }
        .reset-btn:hover {
            background: #5a3a1a;
            transform: scale(1.05);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @media (max-width: 600px) {
            .cell { width: 50px; height: 50px; font-size: 18px; }
            .path { gap: 12px; }
        }
    </style>
</head>
<body id="boardBody">
    <div class="board-container">
        <div class="game-header">
            <a href="index.html" class="back-btn">← Главное меню</a>
            <div class="stats-panel">
                <div class="stat"><span>❤️</span><span id="lives">3</span></div>
                <div class="stat"><span>⭐</span><span id="score">0</span></div>
                <div class="stat"><span>🚶</span><span id="moves">0</span></div>
            </div>
        </div>
        
        <div class="location" id="location">
            <div class="location-icon" id="boardIcon">📖</div>
            <h3 id="boardTitle">Загрузка...</h3>
            <p class="location-desc" id="boardDesc"></p>
        </div>
        
        <div class="path" id="pathContainer"></div>
        <div id="questionPanel" class="question-area"></div>
    </div>
    
    <script>
        // ========== ДАННЫЕ ПО АВТОРАМ ==========
        const authorsData = {
            lermontov: {
                name: "М.Ю. Лермонтов",
                icon: "🏔️",
                desc: "«Герой нашего времени» • Кавказ • Дуэль",
                bgGradient: "linear-gradient(135deg, #3a5e3a 0%, #2c4a2c 100%)",
                questions: [
                    { text: "Как зовут главного героя романа «Герой нашего времени»?", options: ["Евгений Онегин", "Григорий Печорин", "Александр Чацкий", "Дмитрий Рудин"], correct: 1, explanation: "Печорин Григорий Александрович." },
                    { text: "С кем Печорин стреляется на дуэли?", options: ["Максим Максимыч", "Грушницкий", "Вернер", "Княжна Мери"], correct: 1, explanation: "Дуэль с Грушницким." },
                    { text: "Как зовут девушку, которую Печорин похищает?", options: ["Княжна Мери", "Вера", "Бэла", "Ундина"], correct: 2, explanation: "Бэла." },
                    { text: "В какой главе история с контрабандистами?", options: ["Бэла", "Максим Максимыч", "Тамань", "Княжна Мери"], correct: 2, explanation: "Тамань." },
                    { text: "Кто убивает Вулича?", options: ["Печорин", "Грушницкий", "Пьяный казак", "Контрабандисты"], correct: 2, explanation: "Пьяный казак." },
                    { text: "Как Печорин относится к судьбе?", options: ["Верит", "Не верит", "Сомневается", "Игнорирует"], correct: 0, explanation: "Верит в предопределение." },
                    { text: "Кто рассказывает историю о Бэле?", options: ["Печорин", "Вернер", "Максим Максимыч", "Грушницкий"], correct: 2, explanation: "Максим Максимыч." },
                    { text: "Где происходит глава «Княжна Мери»?", options: ["Тамань", "Пятигорск", "Кисловодск", "Тифлис"], correct: 1, explanation: "Пятигорск." },
                    { text: "Что происходит с Печориным в конце?", options: ["Женится", "Умирает в Персии", "Становится генералом", "Эмигрирует"], correct: 1, explanation: "Умирает в Персии." },
                    { text: "Какой тип представляет Печорин?", options: ["Лишний человек", "Маленький человек", "Романтический герой", "Герой-любовник"], correct: 0, explanation: "Лишний человек." }
                ]
            },
            tolstoy: {
                name: "Л.Н. Толстой",
                icon: "⚔️",
                desc: "«Война и мир» • Бородино • Судьба России",
                bgGradient: "linear-gradient(135deg, #5d3a1a 0%, #8b5a2b 100%)",
                questions: [
                    { text: "Сколько томов в романе «Война и мир»?", options: ["3 тома", "4 тома", "5 томов", "6 томов"], correct: 1, explanation: "4 тома." },
                    { text: "Кто командует русской армией во время Бородинского сражения?", options: ["Наполеон", "Кутузов", "Багратион", "Барклай"], correct: 1, explanation: "Кутузов." },
                    { text: "За кого в конце выходит замуж Наташа Ростова?", options: ["Андрей Болконский", "Пьер Безухов", "Анатоль Курагин", "Николай Ростов"], correct: 1, explanation: "За Пьера Безухова." },
                    { text: "Что происходит с Андреем Болконским?", options: ["Женится", "Умирает от ранения", "Эмигрирует", "Становится декабристом"], correct: 1, explanation: "Умирает от ранения." },
                    { text: "Фамилия Наташи Ростовой?", options: ["Болконская", "Курагина", "Ростова", "Безухова"], correct: 2, explanation: "Ростова." },
                    { text: "Кто отдал подводы для раненых?", options: ["Андрей", "Пьер", "Наташа", "Кутузов"], correct: 2, explanation: "Наташа." },
                    { text: "Главное сражение романа?", options: ["Аустерлиц", "Шенграбен", "Бородино", "Тарутино"], correct: 2, explanation: "Бородино." },
                    { text: "Кто такой Платон Каратаев?", options: ["Враг", "Учитель мудрости", "Сослуживец", "Родственник"], correct: 1, explanation: "Символ народной мудрости." },
                    { text: "Что символизирует дуб?", options: ["Смерть", "Возрождение", "Старость", "Войну"], correct: 1, explanation: "Символ возрождения Андрея." },
                    { text: "Главная мысль романа?", options: ["Героизм личности", "Роль народа", "Любовь", "Критика монархии"], correct: 1, explanation: "Историей движет народ." }
                ]
            },
            bulgakov: {
                name: "М.А. Булгаков",
                icon: "🏙️",
                desc: "«Белая гвардия» • Киев 1918 • Дом Турбиных",
                bgGradient: "linear-gradient(135deg, #2c2c3a 0%, #1a1a2a 100%)",
                questions: [
                    { text: "Дом Турбиных находится на...", options: ["Набережной", "Алексеевском спуске", "Крещатике", "Подоле"], correct: 1, explanation: "Алексеевский спуск, 13." },
                    { text: "Символ дома Турбиных?", options: ["Кремовые шторы", "Библиотека", "Рояль", "Печка"], correct: 0, explanation: "Кремовые шторы." },
                    { text: "Кто спасает Алексея Турбина?", options: ["Елена", "Юлия Рейс", "Николка", "Мышлаевский"], correct: 1, explanation: "Юлия Рейс." },
                    { text: "Как зовут сестру Турбиных?", options: ["Наташа", "Елена", "Анна", "Варвара"], correct: 1, explanation: "Елена." },
                    { text: "Порядок смены власти в Киеве?", options: ["Б→Г→П", "Г→П→Б", "П→Г→Б", "Б→П→Г"], correct: 1, explanation: "Гетман→Петлюра→Большевики." },
                    { text: "Кто погибает, спасая юнкеров?", options: ["Алексей", "Николка", "Най-Турс", "Мышлаевский"], correct: 2, explanation: "Най-Турс." },
                    { text: "Что снится Алексею после ранения?", options: ["Война", "Рай", "Дом", "Любовь"], correct: 1, explanation: "Рай, где все равны." },
                    { text: "Профессия Алексея Турбина?", options: ["Врач", "Военный", "Писатель", "Адвокат"], correct: 0, explanation: "Врач." },
                    { text: "Что с Николкой в финале?", options: ["Погибает", "Эмигрирует", "Остаётся", "Женится"], correct: 2, explanation: "Остаётся в Киеве." },
                    { text: "Финальная фраза романа?", options: ["Всё пройдёт", "Звёзды останутся", "Всё будет правильно", "Мир построен"], correct: 1, explanation: "«Но звёзды останутся»." }
                ]
            }
        };
        
        // Получаем выбранного автора
        const author = localStorage.getItem('boardAuthor');
        if (!author || !authorsData[author]) {
            alert('Пожалуйста, выберите автора в главном меню');
            window.location.href = 'index.html';
        }
        
        const data = authorsData[author];
        document.getElementById('boardBody').style.background = data.bgGradient;
        document.getElementById('boardIcon').textContent = data.icon;
        document.getElementById('boardTitle').textContent = data.name;
        document.getElementById('boardDesc').textContent = data.desc;
        
        // Параметры игры
        const TOTAL_CELLS = 8;  // клетки 1-8
        let currentCell = 0;    // 0 = клетка 1
        let score = 0;
        let lives = 3;
        let moves = 0;           // количество сделанных ходов
        let awaitingAnswer = false;
        let currentQuestion = null;
        let pendingTargetCell = null;
        
        const pathContainer = document.getElementById('pathContainer');
        const questionPanel = document.getElementById('questionPanel');
        const livesSpan = document.getElementById('lives');
        const scoreSpan = document.getElementById('score');
        const movesSpan = document.getElementById('moves');
        
        function updateUI() {
            livesSpan.textContent = lives;
            scoreSpan.textContent = score;
            movesSpan.textContent = moves;
            drawPath();
            
            if (lives <= 0) {
                questionPanel.innerHTML = `
                    <div class="final-screen">
                        <div class="final-icon">💀</div>
                        <h2>Поражение...</h2>
                        <p>У вас закончились жизни!</p>
                        <div class="final-score">${score} баллов</div>
                        <button id="resetBoardBtn" class="reset-btn">Начать заново</button>
                    </div>
                `;
                document.getElementById('resetBoardBtn')?.addEventListener('click', () => resetGame());
                return;
            }
            
            if (currentCell === TOTAL_CELLS - 1) {
                const totalPossible = TOTAL_CELLS * 10;
                const percent = (score / totalPossible) * 100;
                let prizeQuote = percent >= 80 ? "Блестяще! Вы настоящий знаток литературы!" : (percent >= 50 ? "Неплохо! Но есть куда расти." : "Перечитайте произведения и попробуйте снова!");
                questionPanel.innerHTML = `
                    <div class="final-screen">
                        <div class="final-icon">🏆</div>
                        <h2>Поздравляем! Путь пройден!</h2>
                        <div class="final-score">${score} / ${totalPossible} баллов</div>
                        <div class="prize">${prizeQuote}</div>
                        <button id="resetBoardBtn" class="reset-btn">Пройти заново</button>
                    </div>
                `;
                document.getElementById('resetBoardBtn')?.addEventListener('click', () => resetGame());
                return;
            }
        }
        
        function drawPath() {
            pathContainer.innerHTML = '';
            for (let i = 0; i < TOTAL_CELLS; i++) {
                const cell = document.createElement('div');
                cell.classList.add('cell');
                cell.textContent = (i + 1).toString();
                
                if (i < currentCell) {
                    cell.classList.add('passed');
                } else if (i === currentCell) {
                    cell.classList.add('current');
                } else if (i === currentCell + 1) {
                    cell.classList.add('next');
                    if (!awaitingAnswer && lives > 0) {
                        cell.addEventListener('click', () => askQuestion(i));
                    }
                } else {
                    cell.classList.add('locked');
                }
                
                pathContainer.appendChild(cell);
            }
        }
        
        function askQuestion(targetCell) {
            if (awaitingAnswer) return;
            if (lives <= 0) return;
            if (targetCell !== currentCell + 1) return;
            
            pendingTargetCell = targetCell;
            const randomIndex = Math.floor(Math.random() * data.questions.length);
            currentQuestion = data.questions[randomIndex];
            
            awaitingAnswer = true;
            const optionsHtml = currentQuestion.options.map((opt, idx) => 
                `<div class="board-option" data-opt="${idx}">${opt}</div>`
            ).join('');
            
            questionPanel.innerHTML = `
                <div class="question-book">📖 Вопрос для перехода на клетку ${targetCell + 1}</div>
                <div class="question-text">${currentQuestion.text}</div>
                <div class="options-grid" id="boardOptions">${optionsHtml}</div>
                <div id="boardFeedback" class="feedback"></div>
            `;
            
            document.querySelectorAll('.board-option').forEach(opt => {
                opt.addEventListener('click', (e) => {
                    if (!awaitingAnswer) return;
                    const selected = parseInt(opt.dataset.opt);
                    const isCorrect = (selected === currentQuestion.correct);
                    const feedbackDiv = document.getElementById('boardFeedback');
                    
                    if (isCorrect) {
                        const points = 10;
                        score += points;
                        moves++;
                        currentCell = pendingTargetCell;
                        feedbackDiv.innerHTML = `✅ Правильно! +${points} баллов. ${currentQuestion.explanation}`;
                        feedbackDiv.className = 'feedback correct-feedback';
                        opt.classList.add('correct');
                        awaitingAnswer = false;
                        updateUI();
                        setTimeout(() => {
                            if (lives > 0 && currentCell !== TOTAL_CELLS - 1) {
                                questionPanel.innerHTML = `<p style="text-align:center; padding:20px; color:#2c5530;">✅ Переход на клетку ${currentCell+1} успешен!<br>Нажмите на следующую клетку, чтобы продолжить.</p>`;
                                drawPath();
                            } else {
                                updateUI();
                            }
                        }, 1500);
                    } else {
                        lives--;
                        feedbackDiv.innerHTML = `❌ Неправильно. ${currentQuestion.explanation} -1 жизнь.`;
                        feedbackDiv.className = 'feedback wrong-feedback';
                        opt.classList.add('wrong');
                        awaitingAnswer = false;
                        updateUI();
                        setTimeout(() => {
                            if (lives > 0 && currentCell !== TOTAL_CELLS - 1) {
                                questionPanel.innerHTML = `<p style="text-align:center; padding:20px; color:#721c24;">😔 Остались на клетке ${currentCell+1}. Попробуйте снова нажать на следующую клетку.</p>`;
                                drawPath();
                            } else {
                                updateUI();
                            }
                        }, 1500);
                    }
                });
            });
        }
        
        function resetGame() {
            currentCell = 0;
            score = 0;
            lives = 3;
            moves = 0;
            awaitingAnswer = false;
            currentQuestion = null;
            pendingTargetCell = null;
            updateUI();
            questionPanel.innerHTML = `<p style="text-align:center; padding:20px; color:#5a4a2e;">🚀 Нажмите на зелёную клетку 2, чтобы начать путь!</p>`;
            drawPath();
        }
        
        // Инициализация
        updateUI();
        questionPanel.innerHTML = `<p style="text-align:center; padding:20px; color:#5a4a2e;">🚀 Нажмите на зелёную клетку 2, чтобы начать путь!</p>`;
    </script>
</body>
</html>
