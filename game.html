<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Литературный квест</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <a href="index.html" class="back-btn">← Главное меню</a>
            <div class="stats-panel">
                <div class="stat">
                    <span>⭐</span>
                    <span id="score">0</span>
                </div>
                <div class="stat">
                    <span>❤️</span>
                    <span id="lives">3</span>
                </div>
                <div class="stat">
                    <span>📊</span>
                    <span id="questionCount">0/10</span>
                </div>
            </div>
        </div>
        
        <div class="progress-section">
            <div class="progress-bar-container">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-text" id="progressText">Испытание 1 из 10</div>
        </div>
        
        <div class="timer-section">
            <div class="timer-circle">
                <svg class="timer-svg" width="80" height="80" viewBox="0 0 100 100">
                    <circle class="timer-bg" cx="50" cy="50" r="40" fill="none" stroke="#e0d5b5" stroke-width="8"/>
                    <circle class="timer-progress" cx="50" cy="50" r="40" fill="none" stroke="#f7d44a" stroke-width="8" stroke-linecap="round"/>
                </svg>
                <div class="timer-text" id="timerText">10</div>
            </div>
        </div>
        
        <div class="location" id="location">
            <div class="location-icon" id="locationIcon">🏔️</div>
            <h3 id="locationTitle">Загрузка...</h3>
        </div>
        
        <div id="gameContent"></div>
    </div>
    
    <audio id="correctSound" preload="auto">
        <source src="data:audio/wav;base64,U3RlcmVv" type="audio/wav">
    </audio>
    <audio id="wrongSound" preload="auto">
        <source src="data:audio/wav;base64,U3RlcmVv" type="audio/wav">
    </audio>
    <audio id="timeoutSound" preload="auto">
        <source src="data:audio/wav;base64,U3RlcmVv" type="audio/wav">
    </audio>
    
    <script>
        // ========== ДАННЫЕ ПО ПИСАТЕЛЯМ (10 вопросов на каждого) ==========
        const worldsData = {
            lermontov: {
                name: "М.Ю. Лермонтов",
                icon: "🏔️",
                bgGradient: "linear-gradient(135deg, #3a5e3a 0%, #2c4a2c 100%)",
                questions: [
                    { book: "Герой нашего времени", text: "Как зовут главного героя романа «Герой нашего времени»?", options: ["Евгений Онегин", "Григорий Печорин", "Александр Чацкий", "Дмитрий Рудин"], correct: 1, explanation: "Печорин Григорий Александрович — главный герой романа." },
                    { book: "Герой нашего времени", text: "С кем Печорин стреляется на дуэли?", options: ["С Максимом Максимычем", "С Грушницким", "С Вернером", "С княжной Мери"], correct: 1, explanation: "Дуэль была с Грушницким из-за княжны Мери." },
                    { book: "Герой нашего времени", text: "Как зовут девушку, которую Печорин похищает?", options: ["Княжна Мери", "Вера", "Бэла", "Ундина"], correct: 2, explanation: "Бэла — черкешенка, которую Печорин похищает." },
                    { book: "Герой нашего времени", text: "В какой главе романа происходит история с контрабандистами?", options: ["Бэла", "Максим Максимыч", "Тамань", "Княжна Мери"], correct: 2, explanation: "В главе «Тамань» Печорин сталкивается с контрабандистами." },
                    { book: "Герой нашего времени", text: "Кто убивает Вулича в романе?", options: ["Печорин", "Грушницкий", "Пьяный казак", "Контрабандисты"], correct: 2, explanation: "Вулич погибает от руки пьяного казака в главе «Фаталист»." },
                    { book: "Герой нашего времени", text: "Как Печорин относится к судьбе?", options: ["Верит в предопределение", "Не верит в судьбу", "Сомневается", "Игнорирует"], correct: 0, explanation: "Печорин верит в фатум, но проверяет его." },
                    { book: "Герой нашего времени", text: "Как зовут офицера, который рассказывает историю о Бэле?", options: ["Печорин", "Вернер", "Максим Максимыч", "Грушницкий"], correct: 2, explanation: "Максим Максимыч рассказывает историю о Бэле." },
                    { book: "Герой нашего времени", text: "Где происходит действие главы «Княжна Мери»?", options: ["Тамань", "Пятигорск", "Кисловодск", "Тифлис"], correct: 1, explanation: "Действие происходит в Пятигорске." },
                    { book: "Герой нашего времени", text: "Что происходит с Печориным в конце романа?", options: ["Женится", "Умирает в Персии", "Становится генералом", "Эмигрирует"], correct: 1, explanation: "Печорин умирает по дороге из Персии." },
                    { book: "Герой нашего времени", text: "Какой литературный тип представляет Печорин?", options: ["Лишний человек", "Маленький человек", "Романтический герой", "Герой-любовник"], correct: 0, explanation: "Печорин — классический «лишний человек»." }
                ]
            },
            tolstoy: {
                name: "Л.Н. Толстой",
                icon: "⚔️",
                bgGradient: "linear-gradient(135deg, #5d3a1a 0%, #8b5a2b 100%)",
                questions: [
                    { book: "Война и мир", text: "Сколько томов в романе «Война и мир»?", options: ["3", "4", "5", "6"], correct: 1, explanation: "Роман состоит из 4 томов." },
                    { book: "Война и мир", text: "Кто командует русской армией при Бородино?", options: ["Наполеон", "Кутузов", "Багратион", "Барклай-де-Толли"], correct: 1, explanation: "Кутузов — главнокомандующий русской армией." },
                    { book: "Война и мир", text: "За кого выходит замуж Наташа Ростова?", options: ["Андрей Болконский", "Пьер Безухов", "Анатоль Курагин", "Николай Ростов"], correct: 1, explanation: "В конце романа Наташа выходит замуж за Пьера Безухова." },
                    { book: "Война и мир", text: "Что происходит с Андреем Болконским?", options: ["Женится на Наташе", "Умирает от ранения", "Эмигрирует", "Становится декабристом"], correct: 1, explanation: "Андрей Болконский умирает от ранения после Бородинского сражения." },
                    { book: "Война и мир", text: "Какую фамилию носит семья Наташи?", options: ["Болконские", "Курагины", "Ростовы", "Безуховы"], correct: 2, explanation: "Наташа — Ростова, дочь графа Ильи Андреевича Ростова." },
                    { book: "Война и мир", text: "Кто из героев романа предлагает отдать подводы для раненых?", options: ["Андрей Болконский", "Пьер Безухов", "Наташа Ростова", "Кутузов"], correct: 2, explanation: "Наташа уговаривает родителей отдать подводы для раненых." },
                    { book: "Война и мир", text: "Какое сражение описывается в 3 томе романа?", options: ["Аустерлиц", "Шенграбен", "Бородино", "Тарутино"], correct: 2, explanation: "Бородинское сражение — центральное событие 3 тома." },
                    { book: "Война и мир", text: "Кто такой Платон Каратаев для Пьера?", options: ["Враг", "Учитель мудрости", "Сослуживец", "Родственник"], correct: 1, explanation: "Платон Каратаев становится для Пьера символом народной мудрости." },
                    { book: "Война и мир", text: "Что символизирует дуб в романе?", options: ["Смерть", "Жизнь и возрождение", "Старость", "Войну"], correct: 1, explanation: "Дуб символизирует внутреннее возрождение князя Андрея." },
                    { book: "Война и мир", text: "Какова главная мысль романа «Война и мир»?", options: ["Героизм личности", "Роль народа в истории", "Любовная линия", "Критика монархии"], correct: 1, explanation: "Толстой утверждает, что историей движут народные массы." }
                ]
            },
            bulgakov: {
                name: "М.А. Булгаков",
                icon: "🏙️",
                bgGradient: "linear-gradient(135deg, #2c2c3a 0%, #1a1a2a 100%)",
                questions: [
                    { book: "Белая гвардия", text: "Как называется дом семьи Турбиных?", options: ["Дом на набережной", "Дом Турбиных", "Дом на Алексеевском спуске", "Дворянское гнездо"], correct: 2, explanation: "Дом находится на Алексеевском спуске, 13." },
                    { book: "Белая гвардия", text: "Что является символом дома Турбиных?", options: ["Кремовые шторы", "Библиотека", "Рояль", "Печка"], correct: 0, explanation: "Кремовые шторы — символ уюта и защищенности." },
                    { book: "Белая гвардия", text: "Кто спасает раненого Алексея Турбина?", options: ["Елена", "Юлия Рейс", "Николка", "Мышлаевский"], correct: 1, explanation: "Юлия Рейс спасает Алексея." },
                    { book: "Белая гвардия", text: "Как зовут сестру Турбиных?", options: ["Наташа", "Елена", "Анна", "Варвара"], correct: 1, explanation: "Елена Турбина — сестра Алексея и Николки." },
                    { book: "Белая гвардия", text: "Какая власть сменяет друг друга в Киеве?", options: ["Большевики→Гетман→Петлюра", "Гетман→Петлюра→Большевики", "Петлюра→Гетман→Большевики", "Большевики→Петлюра→Гетман"], correct: 1, explanation: "Сначала гетман, затем Петлюра, потом большевики." },
                    { book: "Белая гвардия", text: "Кто из героев погибает, пытаясь спасти гетмана?", options: ["Алексей Турбин", "Николка Турбин", "Най-Турс", "Мышлаевский"], correct: 2, explanation: "Полковник Най-Турс погибает, прикрывая юнкеров." },
                    { book: "Белая гвардия", text: "Что снится Алексею Турбину после ранения?", options: ["Война", "Рай", "Дом", "Любовь"], correct: 1, explanation: "Алексею снится рай, где все люди равны перед Богом." },
                    { book: "Белая гвардия", text: "Какую профессию имеет Алексей Турбин?", options: ["Врач", "Военный", "Писатель", "Адвокат"], correct: 0, explanation: "Алексей Турбин — врач по образованию." },
                    { book: "Белая гвардия", text: "Что происходит с Николкой в финале?", options: ["Погибает", "Эмигрирует", "Остаётся в Киеве", "Женится"], correct: 2, explanation: "Николка остаётся в Киеве после прихода большевиков." },
                    { book: "Белая гвардия", text: "Какая фраза завершает роман?", options: ["Всё пройдёт", "Звёзды останутся", "Всё будет правильно", "Мир построен на этом"], correct: 1, explanation: "«Но звёзды останутся» — надежда на мирное будущее." }
                ]
            }
        };
        
        // Получаем выбранный мир
        const world = localStorage.getItem('currentWorld') || 'lermontov';
        const worldData = worldsData[world];
        
        // Устанавливаем фон
        document.body.style.background = worldData.bgGradient;
        document.getElementById('locationIcon').textContent = worldData.icon;
        document.getElementById('locationTitle').textContent = worldData.name;
        
        // Игровые переменные
        let currentQuestion = 0;
        let score = 0;
        let lives = 3;
        let timeLeft = 10;
        let timerInterval = null;
        let answerLocked = false;
        
        const totalQuestions = worldData.questions.length;
        
        const scoreElement = document.getElementById('score');
        const livesElement = document.getElementById('lives');
        const questionCountElement = document.getElementById('questionCount');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const gameContent = document.getElementById('gameContent');
        const timerText = document.getElementById('timerText');
        const timerProgress = document.querySelector('.timer-progress');
        
        // Звуковые функции
        function playSound(type) {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                const ctx = new AudioContext();
                const oscillator = ctx.createOscillator();
                const gain = ctx.createGain();
                oscillator.connect(gain);
                gain.connect(ctx.destination);
                
                if (type === 'correct') {
                    oscillator.frequency.value = 880;
                    gain.gain.value = 0.2;
                    oscillator.start();
                    gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.3);
                    oscillator.stop(ctx.currentTime + 0.3);
                } else if (type === 'wrong') {
                    oscillator.frequency.value = 440;
                    gain.gain.value = 0.2;
                    oscillator.start();
                    gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.4);
                    oscillator.stop(ctx.currentTime + 0.4);
                } else if (type === 'timeout') {
                    oscillator.frequency.value = 220;
                    gain.gain.value = 0.3;
                    oscillator.start();
                    setTimeout(() => {
                        oscillator.frequency.value = 110;
                    }, 200);
                    gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.8);
                    oscillator.stop(ctx.currentTime + 0.8);
                }
            } catch(e) {}
        }
        
        function updateUI() {
            scoreElement.textContent = score;
            livesElement.textContent = lives;
            questionCountElement.textContent = `${currentQuestion}/${totalQuestions}`;
            const percent = (currentQuestion / totalQuestions) * 100;
            progressFill.style.width = percent + '%';
            progressText.textContent = `Испытание ${currentQuestion + 1} из ${totalQuestions}`;
        }
        
        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }
        
        function startTimer(onTimeout) {
            stopTimer();
            timeLeft = 10;
            timerText.textContent = timeLeft;
            const circumference = 2 * Math.PI * 40;
            const dashArray = circumference;
            timerProgress.style.strokeDasharray = dashArray;
            
            timerInterval = setInterval(() => {
                if (answerLocked) return;
                
                timeLeft--;
                timerText.textContent = timeLeft;
                
                const offset = (timeLeft / 10) * circumference;
                timerProgress.style.strokeDashoffset = dashArray - offset;
                
                if (timeLeft <= 3) {
                    timerText.classList.add('timer-warning');
                } else {
                    timerText.classList.remove('timer-warning');
                }
                
                if (timeLeft <= 0) {
                    stopTimer();
                    playSound('timeout');
                    onTimeout();
                }
            }, 1000);
        }
        
        function showFinalScreen() {
            const totalPossible = totalQuestions * 10;
            const percent = (score / totalPossible) * 100;
            let prizeQuote = "";
            let prizeIcon = "";
            
            if (percent >= 80) {
                if (world === 'lermontov') prizeQuote = "«А что такое счастье?.. Я несчастлив, потому что во мне нет этой гордости...» — М.Ю. Лермонтов";
                else if (world === 'tolstoy') prizeQuote = "«Всё, что я знаю, я знаю благодаря тому, что люблю» — Л.Н. Толстой";
                else prizeQuote = "«Никогда не беги крысой в неизвестность...» — М.А. Булгаков";
                prizeIcon = "🏆";
            } else if (percent >= 50) {
                if (world === 'lermontov') prizeQuote = "«Судьба как-то всегда приводила меня к развязке чужих драм...»";
                else if (world === 'tolstoy') prizeQuote = "«Нет величия там, где нет простоты, добра и правды»";
                else prizeQuote = "«Всё будет правильно. На этом построен мир»";
                prizeIcon = "📖";
            } else {
                if (world === 'lermontov') prizeQuote = "«Скучно мне, потому что я не знаю, зачем живу...» Перечитай роман!";
                else if (world === 'tolstoy') prizeQuote = "«Чем больше мы живём духом, тем менее зависим от внешнего...»";
                else prizeQuote = "«А звёзды останутся...» Перечитай роман!";
                prizeIcon = "🔄";
            }
            
            gameContent.innerHTML = `
                <div class="final-screen">
                    <div class="final-icon">${prizeIcon}</div>
                    <h2>${worldData.name} пройден!</h2>
                    <div class="final-score">${score} / ${totalPossible} баллов</div>
                    <div class="prize">
                        <strong>📜 Литературный приз:</strong><br>
                        "${prizeQuote}"
                    </div>
                    <a href="index.html" class="reset-btn">Выбрать другого писателя →</a>
                </div>
            `;
        }
        
        function handleAnswer(isCorrect, explanation, correctAnswer) {
            if (answerLocked) return;
            answerLocked = true;
            stopTimer();
            
            if (isCorrect) {
                const timeBonus = Math.floor(timeLeft * 0.5);
                const points = 10 + timeBonus;
                score += points;
                playSound('correct');
                showFeedback(true, `✅ Правильно! +${points} баллов (бонус за скорость)`, explanation);
            } else {
                lives--;
                playSound('wrong');
                showFeedback(false, `❌ Неправильно. Правильный ответ: «${correctAnswer}»`, explanation);
                updateUI();
                
                if (lives <= 0) {
                    gameContent.innerHTML = `
                        <div class="final-screen">
                            <div class="final-icon">💀</div>
                            <h2>Поражение...</h2>
                            <div class="final-score">${score} баллов</div>
                            <p>У вас закончились жизни!</p>
                            <a href="index.html" class="reset-btn">Попробовать снова →</a>
                        </div>
                    `;
                    return;
                }
            }
            
            updateUI();
            
            setTimeout(() => {
                currentQuestion++;
                updateUI();
                
                if (currentQuestion >= totalQuestions) {
                    showFinalScreen();
                } else {
                    showQuestion();
                }
            }, 2000);
        }
        
        function showFeedback(isCorrect, message, explanation) {
            const feedbackDiv = document.getElementById('feedback');
            if (feedbackDiv) {
                feedbackDiv.innerHTML = `${message}<br><small>${explanation}</small>`;
                feedbackDiv.className = `feedback ${isCorrect ? 'correct-feedback' : 'wrong-feedback'}`;
            }
        }
        
        function showQuestion() {
            if (currentQuestion >= totalQuestions) return;
            
            const q = worldData.questions[currentQuestion];
            answerLocked = false;
            
            gameContent.innerHTML = `
                <div class="question-card">
                    <div class="question-book">📖 ${q.book}</div>
                    <div class="question-text">${q.text}</div>
                    <div class="options" id="options">
                        ${q.options.map((opt, idx) => `<div class="option" data-index="${idx}">${opt}</div>`).join('')}
                    </div>
                    <div id="feedback" class="feedback"></div>
                </div>
            `;
            
            const options = document.querySelectorAll('.option');
            const feedbackDiv = document.getElementById('feedback');
            
            options.forEach(opt => {
                opt.addEventListener('click', () => {
                    if (answerLocked) return;
                    
                    const selectedIdx = parseInt(opt.dataset.index);
                    const isCorrect = (selectedIdx === q.correct);
                    const correctAnswer = q.options[q.correct];
                    
                    if (isCorrect) {
                        opt.classList.add('correct');
                    } else {
                        opt.classList.add('wrong');
                        options[q.correct].classList.add('correct');
                    }
                    
                    handleAnswer(isCorrect, q.explanation, correctAnswer);
                });
            });
            
            startTimer(() => {
                if (!answerLocked) {
                    lives--;
                    updateUI();
                    playSound('timeout');
                    showFeedback(false, `⏰ Время вышло! Правильный ответ: «${q.options[q.correct]}»`, q.explanation);
                    answerLocked = true;
                    
                    const optionsDiv = document.querySelectorAll('.option');
                    optionsDiv[q.correct].classList.add('correct');
                    
                    setTimeout(() => {
                        currentQuestion++;
                        updateUI();
                        
                        if (lives <= 0) {
                            gameContent.innerHTML = `
                                <div class="final-screen">
                                    <div class="final-icon">💀</div>
                                    <h2>Поражение...</h2>
                                    <div class="final-score">${score} баллов</div>
                                    <p>Время вышло, жизни кончились!</p>
                                    <a href="index.html" class="reset-btn">Попробовать снова →</a>
                                </div>
                            `;
                        } else if (currentQuestion >= totalQuestions) {
                            showFinalScreen();
                        } else {
                            showQuestion();
                        }
                    }, 2000);
                }
            });
        }
        
        updateUI();
        showQuestion();
    </script>
</body>
</html>
