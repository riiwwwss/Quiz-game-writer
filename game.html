<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Литературный квест</title>
    <link rel="stylesheet" href="style.css">
</head>
<body id="gameBody">
    <div class="game-container">
        <div class="game-header">
            <a href="index.html" class="back-btn">← Главное меню</a>
            <div class="stats-panel">
                <div class="stat"><span>⭐</span><span id="score">0</span></div>
                <div class="stat"><span>❤️</span><span id="lives">3</span></div>
                <div class="stat"><span>🔥</span><span id="combo">0</span></div>
            </div>
        </div>
        
        <!-- Карта глав вместо простого прогресс-бара -->
        <div class="chapter-map" id="chapterMap">
            <!-- Динамически заполняется иконками глав -->
        </div>
        
        <div class="timer-section">
            <div class="timer-circle">
                <svg width="80" height="80" viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="40" fill="none" stroke="#e0d5b5" stroke-width="8"/>
                    <circle class="timer-progress" cx="50" cy="50" r="40" fill="none" stroke="#f7d44a" stroke-width="8" stroke-linecap="round"/>
                </svg>
                <div class="timer-text" id="timerText">10</div>
            </div>
        </div>
        
        <div class="location" id="location">
            <div class="location-icon" id="locationIcon">📖</div>
            <h3 id="locationTitle">Загрузка...</h3>
            <p class="location-desc" id="locationDesc"></p>
        </div>
        
        <div id="gameContent"></div>
    </div>
    
    <script>
        const worldsData = {
            lermontov: {
                name: "М.Ю. Лермонтов",
                icon: "🏔️",
                desc: "«Герой нашего времени» • Кавказ • Дуэль",
                bgGradient: "linear-gradient(135deg, #3a5e3a 0%, #2c4a2c 100%)",
                questions: [
                    { book: "Герой нашего времени", text: "Как зовут главного героя романа «Герой нашего времени»?", options: ["Евгений Онегин", "Григорий Печорин", "Александр Чацкий", "Дмитрий Рудин"], correct: 1, explanation: "Печорин Григорий Александрович — главный герой романа." },
                    { book: "Герой нашего времени", text: "С кем Печорин стреляется на дуэли?", options: ["Максим Максимыч", "Грушницкий", "Вернер", "Княжна Мери"], correct: 1, explanation: "Дуэль была с Грушницким из-за княжны Мери." },
                    { book: "Герой нашего времени", text: "Как зовут девушку, которую Печорин похищает?", options: ["Княжна Мери", "Вера", "Бэла", "Ундина"], correct: 2, explanation: "Бэла — черкешенка, которую Печорин похищает." },
                    { book: "Герой нашего времени", text: "В какой главе романа происходит история с контрабандистами?", options: ["Бэла", "Максим Максимыч", "Тамань", "Княжна Мери"], correct: 2, explanation: "В главе «Тамань» Печорин сталкивается с контрабандистами." },
                    { book: "Герой нашего времени", text: "Кто убивает Вулича в романе?", options: ["Печорин", "Грушницкий", "Пьяный казак", "Контрабандисты"], correct: 2, explanation: "Вулич погибает от руки пьяного казака в главе «Фаталист»." },
                    { book: "Герой нашего времени", text: "Как Печорин относится к судьбе?", options: ["Верит в предопределение", "Не верит в судьбу", "Сомневается", "Игнорирует"], correct: 0, explanation: "Печорин верит в фатум, но проверяет его." },
                    { book: "Герой нашего времени", text: "Кто рассказывает историю о Бэле?", options: ["Печорин", "Вернер", "Максим Максимыч", "Грушницкий"], correct: 2, explanation: "Максим Максимыч рассказывает историю о Бэле." },
                    { book: "Герой нашего времени", text: "Где происходит глава «Княжна Мери»?", options: ["Тамань", "Пятигорск", "Кисловодск", "Тифлис"], correct: 1, explanation: "Действие происходит в Пятигорске." },
                    { book: "Герой нашего времени", text: "Что происходит с Печориным в конце?", options: ["Женится", "Умирает в Персии", "Становится генералом", "Эмигрирует"], correct: 1, explanation: "Печорин умирает по дороге из Персии." },
                    { book: "Герой нашего времени", text: "Какой тип представляет Печорин?", options: ["Лишний человек", "Маленький человек", "Романтический герой", "Герой-любовник"], correct: 0, explanation: "Печорин — классический «лишний человек»." }
                ]
            },
            tolstoy: {
                name: "Л.Н. Толстой",
                icon: "⚔️",
                desc: "«Война и мир» • Бородино • Судьба России",
                bgGradient: "linear-gradient(135deg, #5d3a1a 0%, #8b5a2b 100%)",
                questions: [
                    { book: "Война и мир", text: "Сколько томов в романе «Война и мир»?", options: ["3 тома", "4 тома", "5 томов", "6 томов"], correct: 1, explanation: "Роман-эпопея «Война и мир» состоит из 4 томов." },
                    { book: "Война и мир", text: "Кто командует русской армией во время Бородинского сражения?", options: ["Наполеон", "Кутузов", "Багратион", "Барклай-де-Толли"], correct: 1, explanation: "Кутузов — главнокомандующий." },
                    { book: "Война и мир", text: "За кого в конце выходит замуж Наташа Ростова?", options: ["Андрей Болконский", "Пьер Безухов", "Анатоль Курагин", "Николай Ростов"], correct: 1, explanation: "Наташа выходит замуж за Пьера Безухова." },
                    { book: "Война и мир", text: "Что происходит с Андреем Болконским?", options: ["Женится", "Умирает от ранения", "Эмигрирует", "Становится декабристом"], correct: 1, explanation: "Князь Андрей умирает от ранения." },
                    { book: "Война и мир", text: "Фамилия Наташи Ростовой?", options: ["Болконская", "Курагина", "Ростова", "Безухова"], correct: 2, explanation: "Наташа — Ростова." },
                    { book: "Война и мир", text: "Кто отдал подводы для раненых?", options: ["Андрей", "Пьер", "Наташа", "Кутузов"], correct: 2, explanation: "Наташа уговорила родителей отдать подводы." },
                    { book: "Война и мир", text: "Главное сражение романа?", options: ["Аустерлиц", "Шенграбен", "Бородино", "Тарутино"], correct: 2, explanation: "Бородинское сражение." },
                    { book: "Война и мир", text: "Кто такой Платон Каратаев?", options: ["Враг", "Учитель мудрости", "Сослуживец", "Родственник"], correct: 1, explanation: "Символ народной мудрости." },
                    { book: "Война и мир", text: "Что символизирует дуб?", options: ["Смерть", "Возрождение", "Старость", "Войну"], correct: 1, explanation: "Символ возрождения Андрея." },
                    { book: "Война и мир", text: "Главная мысль романа?", options: ["Героизм личности", "Роль народа", "Любовь", "Критика монархии"], correct: 1, explanation: "Историей движет народ." }
                ]
            },
            bulgakov: {
                name: "М.А. Булгаков",
                icon: "🏙️",
                desc: "«Белая гвардия» • Киев 1918 • Дом Турбиных",
                bgGradient: "linear-gradient(135deg, #2c2c3a 0%, #1a1a2a 100%)",
                questions: [
                    { book: "Белая гвардия", text: "Дом Турбиных находится на...", options: ["Набережной", "Алексеевском спуске", "Крещатике", "Подоле"], correct: 1, explanation: "Алексеевский спуск, 13." },
                    { book: "Белая гвардия", text: "Символ дома Турбиных?", options: ["Кремовые шторы", "Библиотека", "Рояль", "Печка"], correct: 0, explanation: "Кремовые шторы." },
                    { book: "Белая гвардия", text: "Кто спасает Алексея Турбина?", options: ["Елена", "Юлия Рейс", "Николка", "Мышлаевский"], correct: 1, explanation: "Юлия Рейс." },
                    { book: "Белая гвардия", text: "Как зовут сестру Турбиных?", options: ["Наташа", "Елена", "Анна", "Варвара"], correct: 1, explanation: "Елена." },
                    { book: "Белая гвардия", text: "Порядок смены власти в Киеве?", options: ["Б→Г→П", "Г→П→Б", "П→Г→Б", "Б→П→Г"], correct: 1, explanation: "Гетман→Петлюра→Большевики." },
                    { book: "Белая гвардия", text: "Кто погибает, спасая юнкеров?", options: ["Алексей", "Николка", "Най-Турс", "Мышлаевский"], correct: 2, explanation: "Най-Турс." },
                    { book: "Белая гвардия", text: "Что снится Алексею после ранения?", options: ["Война", "Рай", "Дом", "Любовь"], correct: 1, explanation: "Рай, где все равны." },
                    { book: "Белая гвардия", text: "Профессия Алексея Турбина?", options: ["Врач", "Военный", "Писатель", "Адвокат"], correct: 0, explanation: "Врач." },
                    { book: "Белая гвардия", text: "Что с Николкой в финале?", options: ["Погибает", "Эмигрирует", "Остаётся", "Женится"], correct: 2, explanation: "Остаётся в Киеве." },
                    { book: "Белая гвардия", text: "Финальная фраза романа?", options: ["Всё пройдёт", "Звёзды останутся", "Всё будет правильно", "Мир построен"], correct: 1, explanation: "«Но звёзды останутся»." }
                ]
            }
        };
        
        let world = localStorage.getItem('currentWorld');
        if (!world || !worldsData[world]) {
            alert('Пожалуйста, выберите писателя в главном меню.');
            window.location.href = 'index.html';
            return;
        }
        
        const worldData = worldsData[world];
        document.getElementById('gameBody').style.background = worldData.bgGradient;
        document.getElementById('locationIcon').textContent = worldData.icon;
        document.getElementById('locationTitle').textContent = worldData.name;
        document.getElementById('locationDesc').textContent = worldData.desc;
        
        let currentQuestion = 0;
        let score = 0;
        let lives = 3;
        let combo = 0;          // счётчик правильных ответов подряд
        let timeLeft = 10;
        let timerInterval = null;
        let answerLocked = false;
        const totalQuestions = worldData.questions.length;
        
        const scoreElement = document.getElementById('score');
        const livesElement = document.getElementById('lives');
        const comboElement = document.getElementById('combo');
        const gameContent = document.getElementById('gameContent');
        const timerText = document.getElementById('timerText');
        const timerProgress = document.querySelector('.timer-progress');
        const circumference = 2 * Math.PI * 40;
        
        // Создаём карту глав
        function buildChapterMap() {
            const mapContainer = document.getElementById('chapterMap');
            mapContainer.innerHTML = '';
            for (let i = 0; i < totalQuestions; i++) {
                const chapter = document.createElement('div');
                chapter.className = 'chapter-marker';
                if (i < currentQuestion) chapter.classList.add('completed');
                else if (i === currentQuestion) chapter.classList.add('active');
                chapter.textContent = (i + 1).toString();
                mapContainer.appendChild(chapter);
            }
        }
        
        function updateUI() {
            scoreElement.textContent = score;
            livesElement.textContent = lives;
            comboElement.textContent = combo;
            // Обновляем карту глав
            const markers = document.querySelectorAll('.chapter-marker');
            markers.forEach((marker, idx) => {
                marker.classList.remove('completed', 'active');
                if (idx < currentQuestion) marker.classList.add('completed');
                else if (idx === currentQuestion) marker.classList.add('active');
            });
        }
        
        function playSound(type) {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                const ctx = new AudioContext();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                if (type === 'correct') {
                    osc.frequency.value = 880;
                    gain.gain.value = 0.15;
                    osc.start();
                    gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.3);
                    osc.stop(ctx.currentTime + 0.3);
                } else if (type === 'wrong') {
                    osc.frequency.value = 440;
                    gain.gain.value = 0.15;
                    osc.start();
                    gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.4);
                    osc.stop(ctx.currentTime + 0.4);
                } else if (type === 'bonus') {
                    osc.frequency.value = 1046.5;
                    gain.gain.value = 0.2;
                    osc.start();
                    gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.5);
                    osc.stop(ctx.currentTime + 0.5);
                } else if (type === 'timeout') {
                    osc.frequency.value = 220;
                    gain.gain.value = 0.2;
                    osc.start();
                    setTimeout(() => { osc.frequency.value = 110; }, 200);
                    gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.8);
                    osc.stop(ctx.currentTime + 0.8);
                }
            } catch(e) { console.log("Звук не поддерживается"); }
        }
        
        function stopTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = null;
        }
        
        function startTimer(onTimeout) {
            stopTimer();
            timeLeft = 10;
            timerText.textContent = timeLeft;
            timerProgress.style.strokeDasharray = circumference;
            timerProgress.style.strokeDashoffset = 0;
            timerText.classList.remove('timer-warning');
            timerInterval = setInterval(() => {
                if (answerLocked) return;
                timeLeft--;
                timerText.textContent = timeLeft;
                const offset = (timeLeft / 10) * circumference;
                timerProgress.style.strokeDashoffset = circumference - offset;
                if (timeLeft <= 3) timerText.classList.add('timer-warning');
                else timerText.classList.remove('timer-warning');
                if (timeLeft <= 0) {
                    stopTimer();
                    playSound('timeout');
                    onTimeout();
                }
            }, 1000);
        }
        
        function shakeElement(el) {
            el.style.animation = 'shake 0.3s ease';
            setTimeout(() => { el.style.animation = ''; }, 300);
        }
        
        function showFinalScreen() {
            const totalPossible = totalQuestions * 10;
            const percent = (score / totalPossible) * 100;
            let prizeQuote = "", prizeIcon = "";
            if (percent >= 80) {
                if (world === 'lermontov') prizeQuote = "«А что такое счастье?..» — М.Ю. Лермонтов";
                else if (world === 'tolstoy') prizeQuote = "«Всё, что я знаю, я знаю благодаря любви» — Л.Н. Толстой";
                else prizeQuote = "«Никогда не беги крысой в неизвестность...» — М.А. Булгаков";
                prizeIcon = "🏆";
            } else if (percent >= 50) {
                if (world === 'lermontov') prizeQuote = "«Судьба приводила меня к развязке чужих драм...»";
                else if (world === 'tolstoy') prizeQuote = "«Нет величия там, где нет простоты, добра и правды»";
                else prizeQuote = "«Всё будет правильно. На этом построен мир»";
                prizeIcon = "📖";
            } else {
                if (world === 'lermontov') prizeQuote = "«Скучно мне...» Перечитай роман!";
                else if (world === 'tolstoy') prizeQuote = "«Чем больше мы живём духом...» Перечитай роман!";
                else prizeQuote = "«А звёзды останутся...» Перечитай роман!";
                prizeIcon = "🔄";
            }
            gameContent.innerHTML = `
                <div class="final-screen">
                    <div class="final-icon">${prizeIcon}</div>
                    <h2>${worldData.name} пройден!</h2>
                    <div class="final-score">${score} / ${totalPossible} баллов</div>
                    <div class="prize"><strong>📜 Литературный приз:</strong><br>"${prizeQuote}"</div>
                    <a href="index.html" class="reset-btn">Выбрать другого писателя →</a>
                </div>
            `;
        }
        
        function showFeedback(isCorrect, message, explanation) {
            const feedbackDiv = document.getElementById('feedback');
            if (feedbackDiv) {
                feedbackDiv.innerHTML = `${message}<br><small>${explanation}</small>`;
                feedbackDiv.className = `feedback ${isCorrect ? 'correct-feedback' : 'wrong-feedback'}`;
            }
        }
        
        function handleAnswer(isCorrect, explanation, correctAnswer, timeLeftAtAnswer) {
            if (answerLocked) return;
            answerLocked = true;
            stopTimer();
            
            if (isCorrect) {
                const timeBonus = Math.floor(timeLeftAtAnswer * 0.5);
                let points = 10 + timeBonus;
                // Комбо: каждые 3 правильных ответа подряд даём +5 очков и +1 жизнь
                combo++;
                if (combo === 3) {
                    points += 5;
                    lives++;
                    playSound('bonus');
                    showFeedback(true, `✅ Правильно! +${points} баллов (комбо x3! +5 баллов и +1 жизнь!)`, explanation);
                    updateUI();
                } else {
                    playSound('correct');
                    showFeedback(true, `✅ Правильно! +${points} баллов (бонус за скорость: +${timeBonus})`, explanation);
                }
                score += points;
                updateUI();
            } else {
                lives--;
                combo = 0;
                playSound('wrong');
                showFeedback(false, `❌ Неправильно. Правильный ответ: «${correctAnswer}»`, explanation);
                updateUI();
                if (lives <= 0) {
                    gameContent.innerHTML = `<div class="final-screen"><div class="final-icon">💀</div><h2>Поражение...</h2><div class="final-score">${score} баллов</div><p>У вас закончились жизни!</p><a href="index.html" class="reset-btn">Попробовать снова →</a></div>`;
                    return;
                }
                shakeElement(document.querySelector('.question-card'));
            }
            updateUI();
            
            setTimeout(() => {
                currentQuestion++;
                updateUI();
                if (currentQuestion >= totalQuestions) showFinalScreen();
                else showQuestion();
            }, 2000);
        }
        
        function showQuestion() {
            if (currentQuestion >= totalQuestions) return;
            const q = worldData.questions[currentQuestion];
            answerLocked = false;
            
            gameContent.innerHTML = `
                <div class="question-card">
                    <div class="question-book">📖 ${q.book}</div>
                    <div class="question-text">${q.text}</div>
                    <div class="options" id="options">
                        ${q.options.map((opt, idx) => `<div class="option" data-index="${idx}">${opt}</div>`).join('')}
                    </div>
                    <div id="feedback" class="feedback"></div>
                </div>
            `;
            
            const options = document.querySelectorAll('.option');
            options.forEach(opt => {
                opt.addEventListener('click', () => {
                    if (answerLocked) return;
                    const selectedIdx = parseInt(opt.dataset.index);
                    const isCorrect = (selectedIdx === q.correct);
                    const correctAnswer = q.options[q.correct];
                    if (isCorrect) {
                        opt.classList.add('correct');
                    } else {
                        opt.classList.add('wrong');
                        options[q.correct].classList.add('correct');
                        shakeElement(opt);
                    }
                    handleAnswer(isCorrect, q.explanation, correctAnswer, timeLeft);
                });
            });
            
            startTimer(() => {
                if (!answerLocked) {
                    lives--;
                    combo = 0;
                    updateUI();
                    playSound('timeout');
                    showFeedback(false, `⏰ Время вышло! Правильный ответ: «${q.options[q.correct]}»`, q.explanation);
                    answerLocked = true;
                    const optionsDiv = document.querySelectorAll('.option');
                    optionsDiv[q.correct].classList.add('correct');
                    setTimeout(() => {
                        currentQuestion++;
                        updateUI();
                        if (lives <= 0) {
                            gameContent.innerHTML = `<div class="final-screen"><div class="final-icon">💀</div><h2>Поражение...</h2><div class="final-score">${score} баллов</div><p>Время вышло, жизни кончились!</p><a href="index.html" class="reset-btn">Попробовать снова →</a></div>`;
                        } else if (currentQuestion >= totalQuestions) showFinalScreen();
                        else showQuestion();
                    }, 2000);
                }
            });
        }
        
        buildChapterMap();
        updateUI();
        showQuestion();
    </script>
</body>
</html>
