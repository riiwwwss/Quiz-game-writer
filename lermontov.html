<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Лермонтов - Герой нашего времени</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: linear-gradient(135deg, #3a5e3a 0%, #2c4a2c 100%);
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <a href="index.html" class="back-btn">← Вернуться</a>
            <div class="stats-panel">
                <div class="stat"><span>⭐</span><span id="score">0</span></div>
                <div class="stat"><span>❤️</span><span id="lives">3</span></div>
                <div class="stat"><span>📊</span><span id="questionCount">0/10</span></div>
            </div>
        </div>
        
        <div class="progress-section">
            <div class="progress-bar-container"><div class="progress-fill" id="progressFill"></div></div>
            <div class="progress-text" id="progressText">Испытание 1 из 10</div>
        </div>
        
        <div class="timer-section">
            <div class="timer-circle">
                <svg width="80" height="80" viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="40" fill="none" stroke="#e0d5b5" stroke-width="8"/>
                    <circle class="timer-progress" cx="50" cy="50" r="40" fill="none" stroke="#f7d44a" stroke-width="8" stroke-linecap="round"/>
                </svg>
                <div class="timer-text" id="timerText">10</div>
            </div>
        </div>
        
        <div class="location">
            <div class="location-icon">🏔️</div>
            <h3>М.Ю. Лермонтов</h3>
            <p class="location-desc">«Герой нашего времени» • Кавказ • Дуэль</p>
        </div>
        
        <div id="gameContent"></div>
    </div>
    
    <script>
        const questions = [
            { book: "Герой нашего времени", text: "Как зовут главного героя романа?", options: ["Евгений Онегин", "Григорий Печорин", "Александр Чацкий", "Дмитрий Рудин"], correct: 1, explanation: "Печорин — главный герой." },
            { book: "Герой нашего времени", text: "С кем Печорин стреляется на дуэли?", options: ["Максим Максимыч", "Грушницкий", "Вернер", "Княжна Мери"], correct: 1, explanation: "Дуэль с Грушницким." },
            { book: "Герой нашего времени", text: "Как зовут девушку, которую Печорин похищает?", options: ["Княжна Мери", "Вера", "Бэла", "Ундина"], correct: 2, explanation: "Бэла — черкешенка." },
            { book: "Герой нашего времени", text: "В какой главе история с контрабандистами?", options: ["Бэла", "Максим Максимыч", "Тамань", "Княжна Мери"], correct: 2, explanation: "Тамань — глава о контрабандистах." },
            { book: "Герой нашего времени", text: "Кто убивает Вулича?", options: ["Печорин", "Грушницкий", "Пьяный казак", "Контрабандисты"], correct: 2, explanation: "Вулича убивает пьяный казак." },
            { book: "Герой нашего времени", text: "Как Печорин относится к судьбе?", options: ["Верит", "Не верит", "Сомневается", "Игнорирует"], correct: 0, explanation: "Печорин верит в предопределение." },
            { book: "Герой нашего времени", text: "Кто рассказывает историю о Бэле?", options: ["Печорин", "Вернер", "Максим Максимыч", "Грушницкий"], correct: 2, explanation: "Максим Максимыч рассказывает." },
            { book: "Герой нашего времени", text: "Где происходит глава «Княжна Мери»?", options: ["Тамань", "Пятигорск", "Кисловодск", "Тифлис"], correct: 1, explanation: "Действие в Пятигорске." },
            { book: "Герой нашего времени", text: "Что происходит с Печориным в конце?", options: ["Женится", "Умирает в Персии", "Становится генералом", "Эмигрирует"], correct: 1, explanation: "Печорин умирает в Персии." },
            { book: "Герой нашего времени", text: "Какой тип представляет Печорин?", options: ["Лишний человек", "Маленький человек", "Романтический герой", "Герой-любовник"], correct: 0, explanation: "Печорин — «лишний человек»." }
        ];
        
        let currentQuestion = 0, score = 0, lives = 3, timeLeft = 10, timerInterval = null, answerLocked = false;
        const totalQuestions = questions.length;
        
        const scoreEl = document.getElementById('score'), livesEl = document.getElementById('lives'), qCountEl = document.getElementById('questionCount');
        const progressFill = document.getElementById('progressFill'), progressText = document.getElementById('progressText'), gameContent = document.getElementById('gameContent');
        const timerText = document.getElementById('timerText'), timerProgress = document.querySelector('.timer-progress');
        const circumference = 2 * Math.PI * 40;
        
        function updateUI() {
            scoreEl.textContent = score; livesEl.textContent = lives; qCountEl.textContent = `${currentQuestion}/${totalQuestions}`;
            progressFill.style.width = (currentQuestion / totalQuestions) * 100 + '%';
            progressText.textContent = `Испытание ${currentQuestion + 1} из ${totalQuestions}`;
        }
        
        function playSound(type) {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator(), gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                if (type === 'correct') { osc.frequency.value = 880; gain.gain.value = 0.15; osc.start(); gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.3); osc.stop(ctx.currentTime + 0.3); }
                else if (type === 'wrong') { osc.frequency.value = 440; gain.gain.value = 0.15; osc.start(); gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.4); osc.stop(ctx.currentTime + 0.4); }
                else if (type === 'timeout') { osc.frequency.value = 220; gain.gain.value = 0.2; osc.start(); setTimeout(() => osc.frequency.value = 110, 200); gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.8); osc.stop(ctx.currentTime + 0.8); }
            } catch(e) {}
        }
        
        function stopTimer() { if (timerInterval) { clearInterval(timerInterval); timerInterval = null; } }
        
        function startTimer(onTimeout) {
            stopTimer(); timeLeft = 10; timerText.textContent = timeLeft; timerProgress.style.strokeDasharray = circumference; timerProgress.style.strokeDashoffset = 0;
            timerInterval = setInterval(() => {
                if (answerLocked) return;
                timeLeft--; timerText.textContent = timeLeft;
                timerProgress.style.strokeDashoffset = circumference - (timeLeft / 10) * circumference;
                if (timeLeft <= 3) timerText.classList.add('timer-warning'); else timerText.classList.remove('timer-warning');
                if (timeLeft <= 0) { stopTimer(); playSound('timeout'); onTimeout(); }
            }, 1000);
        }
        
        function showFinalScreen() {
            let prizeQuote = score >= 80 ? "«А что такое счастье?..» — М.Ю. Лермонтов" : (score >= 50 ? "«Судьба приводила меня к развязке чужих драм...»" : "«Скучно мне...» Перечитай роман!");
            gameContent.innerHTML = `<div class="final-screen"><div class="final-icon">${score >= 80 ? "🏆" : (score >= 50 ? "📖" : "🔄")}</div><h2>Путь завершён!</h2><div class="final-score">${score} / ${totalQuestions * 10} баллов</div><div class="prize"><strong>📜 Приз:</strong><br>"${prizeQuote}"</div><a href="index.html" class="reset-btn">Выбрать другого →</a></div>`;
        }
        
        function showFeedback(isCorrect, message, explanation) {
            const fb = document.getElementById('feedback');
            if (fb) { fb.innerHTML = `${message}<br><small>${explanation}</small>`; fb.className = `feedback ${isCorrect ? 'correct-feedback' : 'wrong-feedback'}`; }
        }
        
        function handleAnswer(isCorrect, explanation, correctAnswer, timeLeftAtAnswer) {
            if (answerLocked) return;
            answerLocked = true; stopTimer();
            if (isCorrect) { score += 10 + Math.floor(timeLeftAtAnswer * 0.5); playSound('correct'); showFeedback(true, `✅ +${10 + Math.floor(timeLeftAtAnswer * 0.5)} баллов`, explanation); }
            else { lives--; playSound('wrong'); showFeedback(false, `❌ Ответ: «${correctAnswer}»`, explanation); updateUI(); if (lives <= 0) { gameContent.innerHTML = `<div class="final-screen"><div class="final-icon">💀</div><h2>Поражение</h2><a href="index.html" class="reset-btn">Сначала →</a></div>`; return; } }
            updateUI();
            setTimeout(() => { currentQuestion++; updateUI(); if (currentQuestion >= totalQuestions) showFinalScreen(); else showQuestion(); }, 2000);
        }
        
        function showQuestion() {
            if (currentQuestion >= totalQuestions) return;
            const q = questions[currentQuestion]; answerLocked = false;
            gameContent.innerHTML = `<div class="question-card"><div class="question-book">📖 ${q.book}</div><div class="question-text">${q.text}</div><div class="options" id="options">${q.options.map((opt, i) => `<div class="option" data-index="${i}">${opt}</div>`).join('')}</div><div id="feedback" class="feedback"></div></div>`;
            const options = document.querySelectorAll('.option');
            options.forEach(opt => opt.addEventListener('click', () => {
                if (answerLocked) return;
                const idx = parseInt(opt.dataset.index), isCorrect = idx === q.correct;
                if (isCorrect) opt.classList.add('correct'); else { opt.classList.add('wrong'); options[q.correct].classList.add('correct'); }
                handleAnswer(isCorrect, q.explanation, q.options[q.correct], timeLeft);
            }));
            startTimer(() => {
                if (!answerLocked) { lives--; updateUI(); playSound('timeout'); showFeedback(false, `⏰ Время! Ответ: «${q.options[q.correct]}»`, q.explanation); answerLocked = true; document.querySelectorAll('.option')[q.correct].classList.add('correct');
                setTimeout(() => { currentQuestion++; updateUI(); if (lives <= 0) gameContent.innerHTML = `<div class="final-screen"><div class="final-icon">💀</div><h2>Поражение</h2><a href="index.html" class="reset-btn">Сначала →</a></div>`; else if (currentQuestion >= totalQuestions) showFinalScreen(); else showQuestion(); }, 2000); }
            });
        }
        
        updateUI(); showQuestion();
    </script>
</body>
</html>
